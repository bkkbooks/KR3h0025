body:
  text: 宣和畫譜卷五人物敘論昔人論人物則曰白晳如瓠其為張蒼眉目若畫其為馬援神姿髙徹之如王衍間雅甚都之如相如容儀俊爽之如裴楷體貌間麗之如宋玉至於論美女則蛾眉皓齒如東鄰之女瓌姿豔逸如洛浦之神至有善為妖態作愁眉啼籹墮馬髻折腰步齲齒笑者皆是形容見於議論之際而然也若夫殷仲堪之眸子裴楷之頰毛精神有取於阿堵中髙逸可置之丘壑間者又非議論之所能及此畫者有以造不言之妙也故畫人物最為難工雖得其形似則往往乏韻故自吳晉以來號為名手者才得三十三人其卓然可傳者則吳之曹弗興晉之衛協隋之鄭法士唐之鄭䖍周昉五代之趙岩杜霄本朝之李公麟彼雖筆端無口而尚論古之人至於品流之髙下一見而可以得之者也然有畫人物得名而特不見於譜者如張昉之雄簡程坦之荒間尹質維真元靄之形似非不善也蓋前有曹衛而後有李公麟照映數子固已奄奄是知譜之所載無虛譽焉人物一前代帝王等寫真附吳曹弗興晉衛協謝稚隋鄭法士唐楊寧楊升張萱鄭䖍陳閎周古言曹弗興吳興人也以畫名冠絶一時孫權命畫屏誤墨成蠅狀權疑其真至於手彈之時吳有八絶弗興預一焉又嘗溪中見赤龍夭矯波間因寫以獻孫皓皓賞激珍藏之至宋文帝時纍月旱暵祈禱無應於是取弗興畫龍置水傍應時雨足且南齊去吳為未逺而謝赫謂弗興之迹殆不復見祕閣之內獨有所畫龍頭又況後南齊數百歲耶嘗畫兵符圖極工然不見諸傳記者豈非一時祕而不出故得以傳逺不坐豐狐文豹之厄也今御府所藏一兵符圖衛協以畫名于時作道釋人物冠絶當代嘗畫七佛圖不㸃目睛人或疑而有請協謂不爾即恐其騰空而去世以協為畫聖名豈虛哉顧愷之以丹青自名獨慎許可亦謂七佛與烈女圖偉而有情勢毛詩北風圖巧密於情思而自以所畫為不及協有烈士圖卞莊子刺虎圖舊傳於代歷世既逺罕見其本今所存者有卞莊子刺虎圖髙士圖皆橫披短軸而髙士圖恐因傳流之誤而為之名豈古烈士圖耶姑因之而不復易今御府所藏三卞莊子刺虎圖一髙士圖二謝稚陳郡陽夏人也初為晉司徒主簿入宋為寧朔將軍善畫多為賢母孝子節婦烈女之圖有補於風教雖䑛筆和墨不無意也今御府所藏二烈女正節圖一三牛圖一鄭法士不知何許人也在周為大都督員外侍郎建中將軍入隋授中散大夫善畫師張僧繇當時已稱髙弟其後得名益著尤長於人物至冠瓔佩帶無不有法而儀矩丰度取像其人雖流水浮雲率無定態筆端之妙亦能形容論者謂江左自僧繇已降法士獨步焉法士弟法輪亦以畫稱雖精密有餘而不近師匠以此失之子德文孫尚子皆傳家學尚子睦州建德尉尤工鬼神論者謂優劣在父祖之間又善為顫筆見於衣服手足木葉川流者皆勢若顫動此蓋深得法士遺範應之於心者然耳故他人欲學莫能髣佛今御府所藏十遊春苑圖四遊春山圖二讀碑圖四楊寧善畫人物與楊升張萱同時皆以寫真得名開元間寫史館像風神氣骨不止於求似而已畫至人物為難楊寧獨工其難而遂擅畫人物專門之習豈易得哉今御府所藏三出遊人馬圖一劉聰對戎圖一庖廚圖一楊升不知何許人也開元中為史館畫真有明皇與肅宗像深得王者氣度後世模倣多矣畫明皇者不知儀範偉麗有非常之表但止於秀目長鬚之態而已又恐覽者不能辨則制衣服冠巾以别之此衆人所能者不足道也升以寫照專門又當時親見竒表宜乎傳之甚精郭若虛見聞志謂升嘗作祿山像今亡矣宜若不足取誠使其人尚在衆必臠食而糞弃雖有遺像亦唾穢不顧升獨為之者豈非著戒於往昔歟今御府所藏四唐明皇真一唐肅宗真一望賢宫圖一髙士圖一張萱京兆人也善畫人物而於貴公子與閨房之秀最工其為花蹊竹榭㸃綴皆極妍巧以金井梧桐秋葉黃之句畫長門怨甚有思致又能寫嬰兒此尤為難蓋嬰兒形貌態度自是一家要於大小歲數間定其面目髫稚世之畫者不失之於身小而貌壯則失之於似婦人又貴賤氣調與骨法尤須各别杜甫詩有小兒五歲氣食牛滿堂賔客皆回頭此豈可以常兒比也畫者宜於此致思焉舊稱萱作貴公子夜遊宫中乞巧乳母抱嬰兒按羯鼓等圖今御府所藏四十有七明皇納涼圖一整籹圖一乳母抱嬰兒圖一搗練圖一執炬宫騎圖一唐后行從圖五挾彈宫騎圖一宫女圖二衛夫人像一按羯鼓圖一按樂士女圖一日本女騎圖一賞雪圖二扶掖士女圖一五王博戲圖二四暢圖一織錦回文圖三元辰像一􅀢林圖一橫笛士女圖二鼓琴士女圖二遊行士女圖一藏謎士女圖一樓觀士女圖一烹茶士女圖一明皇鬬雞射烏圖二寫明皇擊梧桐圖二虢國夫人夜逰圖一虢國夫人逰春圖一七夕祈巧士女圖三寫太真教鸚鵡圖一虢國夫人踏青圖一鄭䖍鄭州滎陽人也善畫山水好書常苦無紙䖍於慈恩寺貯柿葉數屋逐日取葉𨽻書歲久殆遍嘗自寫其詩并畫以獻明皇明皇書其尾曰鄭䖍三絶畫陶潛風氣髙逸前所未見非醉卧北窗下自謂羲皇上人同有是況者何足知若人哉此宜見畫於鄭䖍也䖍官止著作郎今御府所藏八摩騰三藏像一陶潛像一峻嶺溪橋圖四杖引圖一人物圖一陳閎㑹稽人為永王府長史傳寫兼工人物鞍馬其得意處輩流見之莫不斂衽開元中明皇召入供奉每令寫御容妙絶當時又嘗於太清宫寫肅宗不惟龍顔鳳姿日角月宇之狀逼真而筆力英逸真與閻立本並馳爭先故一時人多從其學韓幹亦以畫馬進明皇怪其無閎筆法使令師之其器重故可知也今御府所藏十有七寫唐列聖像一寫唐帝真一公子圖一明皇擊梧桐圖一李思摩真一六祖禪師像六揭帝神像一寫內廏龍駒圖二人馬圖一呈馬圖一入草圖一周古言不知何許人也善畫人物於婦人為尤工多畫宫禁歲時行樂之勝世稱名筆然摹寫形似未為竒特至於布景命思則意在筆外惟覽者得於丹青之所不到則知非常工所能為也今御府所藏三明帝夜逰圖二鵓鴿士女圖一宣和畫譜卷五
