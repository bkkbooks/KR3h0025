body:
  text: 宣和畫譜卷十六花鳥二五代鍾隱黄筌黄居寶滕昌祐宋宗漢孝穎仲佺仲僴士腆士雷曹氏鍾隱天台人善畫鷙禽榛棘能以墨色淺㴱分其向背初欲師郭乾暉知乾暉祕其術不以授人隱乃變姓名託館寓食於其家甘從服役逮逾時乾暉弗覺也隱隂伺其畫而心得之一日乗興作鷂於壁間乾暉知亟就觀之驚歎不已乃謂子得非鍾隱乎遂善遇之益論畫道為詳因是馳譽噫百工技巧有心好之而欲㴱造其妙者雖得其術於艱難之中猶且堅壁不退况進於道者乎隱居江南所畫多為偽唐李煜所有煜皆題印以祕之近時有米芾論畫言鍾隱者葢南唐李氏道號為鍾山之隱者耳固非鍾隱也因以辨之今御府所藏七十有一寒蘆鶉鷂圖二古木鷄鷹圖三田犬逐兎圖二藂棘寒鶉圖一秋汀鶉鷂圖二藂棘伯勞圖一柘枿鶉鷂圖一霜林鶉鷂圖四柘條􅀢鵲圖一棘兎伯勞圖一柘條雙禽圖一柘條山鵲圖一柘條伯勞圖一遊仙松石圖二鷂子竹石圖二古木竹梢圖一鷂子伯勞圖一棗棘鶉鷂圖一架上鷹圖二子母兎圖一竹石小兎圖一鷄鷹圖四馴雉圖二㑹禽圖一鶺鴒圖一架􅀢圖一噪禽圖二雙禽圖四架鷂圖三鷹兎圖一躍兎圖一柘雀圖一鶉鷂圖四竹兎圖一鷙禽圖一飛鷂圖一鷂子圖二雙鷂圖二柘鵲圖一顧兎圖一小兎圖一秋兎圖一棘雀圖一鶻圖一古木鷂圖一黄筌字要叔成都人以工畫早得名于時十七歲事蜀後主王衍為待詔至孟昶加撿挍少府監累遷如京副使後主衍嘗詔筌於内殿觀呉道元畫鍾馗乃謂筌曰呉道元之畫鍾馗者以右手第二指抉鬼之目不若以拇指為有力也令筌改進筌於是不用道元之本别改畫以拇指抉鬼之目者進焉後主怪其不如㫖筌對曰道元之所畫者眼色意思俱在第二指今臣所畫眼色意思俱在拇指後主悟乃喜筌所畫不妄下筆筌資諸家之善而兼有之花竹師滕昌祐烏雀師刁光山水師李昇鶴師薛稷龍師孫遇然其所學筆意豪贍脱去格律過諸公為多如世穪杜子美詩韓退之文無一字無來處所以筌畫兼有衆體之妙故前無古人後無來者今筌於畫得之凡山花野草幽禽異獸溪岸江島釣艇古槎莫不精絶廣政癸丑歲嘗畫野雉於八卦殿有五方使呈鷹於陛殿之下誤認雉為生掣臂者數四時蜀主孟昶嗟異之梅堯臣嘗有詠筌所畫白鶻圖其畧曰畫師黄筌出西蜀成都范君能自知范云筌筆不敢恣自飬鷹鸇觀所宜以此知筌之用意為至悉取生態是豈蹈襲陳迹者哉范君葢蜀郡公范鎮也鎮亦蜀人故知筌之詳細其子居寶居寀亦以畫傳家學今御府所藏三百四十有九桃花雛雀圖一桃竹鸂鶒圖一桃竹湖石圖二桃竹錦雞圖二海棠鵓鴿圖一海棠鸚鵡圖一牡丹鵓鴿圖七牡丹圖二山石牡丹圖一牡丹鶴圖二芍藥家鴿圖一瑞芍藥圖一芍藥黄鶯圖一芍藥鳩子圖二入莧黄鶯圖一牡丹戯貓圖三春龍出蟄圖一梨花鴝鵒圖一夏陂乳牛圖一夏山圖二秋山詩意圖四荷花鷺鷥圖一芙蓉鸂鶒圖三秋塘鸂鶒圖四水石鷺鷥圖一芙蓉鳩子圖一芙蓉雙禽圖三萱草野雉圖三筍竹野鷄圖一萱草山鷓圖一水葒鸂鶒圖一蘆花鸂鶒圖二戲水鸂鶒圖一竹石鳩子圖二竹石黄鸝圖一花石錦鷄圖一冩瑞榮荷圖一躑躅戴勝圖一筍竹碧青圖一芙蓉鷺鷥圖一霜林鷄鴈圖二湖灘煙鷺圖二藥苖雙雀圖一湖灘水石圖三太湖石牡丹圖一戲貓桃石圖一竹堤雙鷺圖一筍竹鶉雀圖一筍竹雛雀圖一雪竹文禽圖二雪竹雙禽圖二雪竹鳩子圖一雪竹錦鷄圖二雪竹雙雉圖一雪禽雙雉圖二雪景花禽圖二雪竹山鷓圖二雪雀鴛鴦圖一雪景噪雀圖一雪景鵪鶉圖一雪雀啄木圖一雪景柘雀圖一雪景雀兎圖一雪山圖二雪景宿禽圖一雪禽圖二雪雉圖二雪雀圖四雪兎圖四寒鷺圖一寒禽圖一竹石鴛鴦圖一竹鶴圖三六鶴圖二雙鶴圖一獨鶴圖一梳翎鶴圖一紅蕉下水鶴圖二山茶鶉雀圖一寒菊蜀禽圖一寫生錦鷄圖一寫生雜禽圖一躑躅義燕兒圖一躑躅錦鷄圖三柘竹鷯子圖一躑躅山鷓圖一蜂蝶花禽圖一雲出山腰圖二鷂子鵪鶉圖一瑪瑙盆鵓鴿圖一沒骨花枝圖一捕雀貓圖一柘條鷯子圖一逐雀貓圖一引雛雀圖一冩生山鷓圖一柘竹雀蝶圖一鸂鶒竹燕圖一竹石繡纓圖一鷓鷂伯勞圖一詩意山水圖五架上鶻圖三架上角鷹圖二架上皁鵰圖一雪景鶉雀圖一竹石雙禽圖二蘆花鸂鶒圖二水石雙鷺圖二山茶雪雀圖二白山鷓圖二架上御鷹圖一皁鵰圖二鷄鷹圖五錦棠圖一秋鷺圖一老鶴圖一雀鴨圖一鶻兎圖三銜花鹿圖一鵰狐圖一雙鷺圖一竹石寒鷺圖三水禽圖三鷓鴣圖一野雉圖三蟬蝶圖一折枝花圖一鷹圖一鳩雀圖一角鷹圖二白鴿圖一白鶻圖一禽雀圖一鵪鶉圖一㝛雀圖一野鶉圖一鷄圖一鵰圖二蜀禽圖一秋鴨圖一竹鴨圖二竹雀圖三錦鷄圖一白鷹圖一鵓鴿圖三御鷹圖一三清像三星官像二夀星像三南極老人像一冩十真人像一秋山夀星圖一真官像一出山佛像一觀音菩薩像一自在觀音像二葛洪移居圖二勘書圖二勘書人物圖一袁安卧雪圖三荘惠觀魚圖二長夀仙圖一七才子圖一搜山天王像一山居圖一春山圖七春日羣山圖二秋岸圖二秋陂躍兎圖二秋景山水圖二雲水秋山圖四竹石圖四竹蘆圖一冩瑞白兎圖一冩生玳瑁圖三冩生碎金圖一冩生龜圖一冩鍾馗氏圖一玉步搖圖二山石貓犬圖一竹石小貓圖一螻蟈戲貓圖一藥苗小兎圖一子母戲貓圖一藥苗戴勝圖一溪山垂綸圖一出陂龍圖一雲龍圖一獵犬圖一汀石圖一騎從圖一墨竹圖一雲巖圖一躍犬圖一昇龍圖一醉仙圖一歸山圖一出水龜圖一天台圖一草堂圖二躍水龍圖一桃石圖一子母貓圖一歸牧圖一溪石圖一草蟲圖一閣道圖一山橋圖一食魚貓圖一雙鹿圖一碎金