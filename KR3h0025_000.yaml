body:
  text: 宣和畫譜藝術類一書畫之屬提要臣等謹案宣和畫譜二十卷不著撰人名氏記宋徽宗朝內府所藏諸畫前有宣和庚子御製序然序中稱今天子云云乃類臣子之頌詞疑標題誤也所載共二百三十一人計六千三百九十六軸分為十門一道釋二人物三宫室四蕃族五龍魚六山水七鳥獸八花木九墨竹十蔬果考趙彥衛雲麓漫鈔載宣和畫學分六科一曰佛道二曰人物三曰山川四曰鳥獸五曰竹花六曰屋木與此大同小異蓋後又更定其條目也蔡絛鐵圍山叢談曰崇寧初命宋喬年值御前書畫所喬年後罷去繼以米芾輩逮至末年上方所藏率至千計吾以宣和癸卯嵗常得見其目云云癸卯在庚子後三年當時書畫二譜蓋即就其目排比成書歟徽宗繪事本工米芾又稱精鑒故其所録收藏家據以為徵非王黼等所輯博古圖動輒舛謬者比絛又稱御府所祕古來丹青其最髙逺者以曹不興元女授黃帝兵符圖為第一曹髦卞莊子刺虎圖第二謝稚烈女貞節圖第三自餘始數顧陸僧繇而下與今本次第不同蓋作譜之時乃分類排纂其收藏之目則以時代先後為差也又卞莊子刺虎圖今本作衛協不作曹髦則併標題名氏亦有所考正更易矣王肯堂筆麈曰畫譜采薈諸家記録或臣下撰述不出一手故有自相矛盾者如山水部稱王士元兼有諸家之妙而宫室部以皂𨽻目之之類許道寧條稱張文懿公深加歎賞亦非徽宗御撰蓋亦未詳繹序文然所指抵牾之處則固切中其失也乾隆四十六年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:100123eafda30541f724179767a6000a7db822189f8d57b78925d0649de4fe88
