body:
  text: 宣和畫譜卷十山水敘論嶽鎮川靈海涵地負至于造化之神秀隂陽之明晦萬里之逺可得之於咫尺間其非胸中自有丘壑發而見諸形容未必知此且自唐至本朝以畫山水得名者類非畫家者流而多出於縉紳士大夫然得其氣韻者或乏筆法或得筆法者多失位置兼衆妙而有之者亦世難其人蓋昔人以泉石膏盲煙霞痼疾為幽人隱士之誚是則山水之於畫市之於康衢世目未必售也至唐有李思訓盧鴻一王維張璪輩五代有荆浩關同是皆不獨畫造其妙而人品甚髙若不可及者至本朝李成一出雖師法荆浩而擅出藍之譽數子之法遂亦掃地無餘如范寬郭熙王詵之流固已各自名家而皆得其一體不足以窺其奧也其間馳譽後先者凡四十人悉具于譜此不復書若商訓周曾李茂等亦以山水得名然商訓失之拙周曾李茂失之工皆不能造古人之兼長譜之不載蓋自有定論也山水一窠石附唐李思訓李昭道盧鴻一王維王洽項容張詢畢宏張璪荆浩五代關同杜楷李思訓唐宗室也弟姪之間凡妙極丹青者五人思訓最為時所器重官止左武衛大將軍畫皆超絶尤工山石林泉筆格遒徑得湍瀨潺湲煙霞縹渺難寫之狀天寶中明皇召思訓畫大同殿壁兼掩陳夜聞有水聲而明皇謂思訓通神之佳手詎非技進乎道而不為富貴所埋沒則何能得此荒逺閒暇之趣耶其子昭道同時于此亦不凡故人云大李將軍小李將軍者大謂思訓小謂昭道也今人所畫著色山往往多宗之然至其妙處不可到也今御府所藏十有七山居四皓圖二春山圖一江山漁樂圖三羣峰茂林圖三神女圖一無量夀佛圖一四皓圖一五祚宫女圖一踏錦圖三明皇御苑出遊圖一李昭道思訓之子父子俱以畫齊名官至中書舍人時人以小李將軍稱智思筆力視思訓為未及然亦翩翩佳公子也能不墮於裘馬管絃之習而戲弄翰墨為一時妙手顧不偉歟武后時殘虐宗支為宗子者亦皆惴恐不獲安處故雍王賢作黃臺瓜辭以自況冀其感悟而昭道有摘瓜圖著戒不為無補爾今御府所藏六春山圖一落照圖二摘瓜圖一海岸圖二盧鴻一字浩然本范陽人山林之士也隱嵩山開元間以諌議大夫召固辭賜隱居服草堂一所令還山頗喜寫山水平逺之趣非泉石膏肓煙霞痼疾得之心應之手未足以造此畫草堂圖世傳以比王維輞川草堂蓋是所賜一丘一壑自己足了此生今見之筆乃其志也今御府所藏三窠石圖一松林㑹真圖一草堂圖一王維字摩詰開元初擢進士官至尚書右丞唐史自有傳其出處之詳此得以略也維善畫尤精山水當時之畫家者流以謂天機所到而所學者皆不及後世稱重亦云維所畫不下吳道𤣥也觀其思致髙逺初未見於丹青時時詩篇中已自有畫意由是知維之畫出於天性不必以畫拘蓋生而知之者故落花寂寂啼山鳥楊柳青靑渡水人又與行到水窮處坐看雲起時及白雲回望合青靄入看無之類以其句法皆所畫也而送元二使西安詩者後人以至鋪張為陽關曲圖且往時之士人或有占其一藝者無不以藝掩其德若閻立本是也至人以畫師名之立本深以為耻若維則不然矣乃自為詩云夙世謬詞客前身應畫師人卒不以畫師歸之也如杜子美作詩品量人物必有攸當時猶稱維為髙人王右丞也則其他可知何則諸人之以畫名於世者止長於畫也若維者妙齡屬辭長而擢第名盛於開元天寶間豪英貴人虛左以迎寧薛諸王待之若師友兄弟乃以科名文學冠絶當代故時稱朝廷左相筆天下右丞詩之句皆以官稱而不名也至其卜築輞川亦在圖畫中是其胸次所存無適而不瀟灑移志之於畫過人宜矣重可惜者兵火之餘數百年間而流落無幾後來得其髣佛者猶可以絶俗也正如唐史論杜子美謂殘膏賸馥霑丐後人之意況乃真得維之用心處耶今御府所藏一百二十有六太上像二山莊圖一山居圖一棧閣圖七劍閣圖三雪山圖一喚渡圖一運糧圖一雪岡圖四捕魚圖二雪渡圖三漁市圖一騾綱圖一異域圖一早行圖二村墟圖二度關圖一蜀道圖四四皓圖一維摩詰圖二髙僧圖九渡水僧圖三山谷行旅圖一山居農作圖二雪江勝賞圖二雪江詩意圖一雪岡渡關圖一雪川羈旅圖一雪景餞别圖一雪景山居圖二雪景待渡圖三羣峰雪霽圖一江臯㑹遇圖二黃梅出山圖一淨名居士像三渡水羅漢圖一寫須菩提像一寫孟浩然真一寫濟南伏生像一十六羅漢圖四十八王洽不知何許人善能潑墨成畫時人皆號為王潑墨性嗜酒疏逸多放傲於江湖間每欲作圖畫之時必待沈酣之後解衣䃲礴吟嘯鼓躍先以墨潑圖幛之上乃因似其形像或為山或為石或為林或為泉者自然天成倐若造化已而雲霞卷舒煙雨慘淡不見其墨汚之迹非畫史之筆墨所能到也宋白喜題品嘗題洽所畫山水詩其首章云疊巘層巒一潑開細情髙興互相催此則知洽潑墨之畫為臻妙也今御府所藏二嚴光釣瀨圖喬松圖項容不知何許人當時以處士名稱之善畫山水師事王默作松峰泉石圖筆法枯硬而少溫潤故昔之評畫者譏其頑澀然挺特巉絶亦自是一家今御府所藏二松峰圖寒松漱石圖張詢南海人不第後流寓長安以畫自適後至蜀中因假館於昭覺寺為僧夢休作早午晚三景圖於壁間率取吳中山水氣象用以落筆焉唐僖宗幸蜀見之歎賞彌日蓋早晚之景今昔人皆能為之而午景為難狀也譬如詩人吟詠春與秋冬則著述為多而夏則全少耳其後蜀僞主王氏乃欲遷於所居與棟相連移之則損於是遂止詢嘗畫雪峰危棧圖極工意其入蜀之所見也然亦所以著戒有臨深履薄之遺風云今御府所藏二雪峰危棧圖二畢宏不知何許人善工山水乃作松石圖於左省壁間一時文士皆有詩稱之其落筆縱橫皆變易前法不為拘滯也故得生意為多蓋畫家之流嘗有諺語謂畫松當如夜義臂鸛鵲啄而深坳淺凸又所以為石焉而宏一切變通意在筆前非繩墨所能制宏大歷間官至京兆少尹今御府所藏一松石圖張璪一作藻字文通吳郡人官止撿挍祠部員外郎衣冠文行為一時名流善畫松石山水自撰繪境一篇言畫之要訣畢庶子宏擅名於當代一見驚異之蓋璪嘗以手握雙管一為生枝一為枯枿而四時之行遂驅筆得之所畫山水之狀則髙低秀絶咫尺深重幾若斷取一時號為神品唐兵部員外郎李約好畫成癖聞有家藏璪松石幛者乃詣購其家妻已練為衣故知世間尤物遭不幸者豈特是而已乎孫何嘗有詩詠吳興而卒章曰誰如張璪工松石擬裂鮫綃畫作圖此則知璪之所畫而為一時稱賞今御府所藏六松石圖二寒林圖二太上像一松竹髙僧圖一荆浩河內人自號為洪谷子博雅好古以山水專門頗得趣向嘗謂吳道𤣥有筆而無墨頃容有墨而無筆浩兼二子所長而有之蓋有筆無墨者見落筆蹊徑而少自然有墨而無筆者去斧鑿痕而多變態故王洽之所畫者先潑墨於縑素之上然後取其髙低上下自然之勢而為之今浩介二者之間則人以為天成兩得之矣故所以可悅衆目使覽者易見焉當時有關同號能畫猶師事浩為門弟子故浩之所能為一時之所器重後乃撰山水訣一卷遂表進藏之袐閣梅堯臣嘗觀浩所畫山水圖曽有詩其略曰上有荆浩字持歸翰林公之句而又曰范寬到老學未足李成但得平逺工此則所以知浩所學固自不凡而堯臣之論非過也今御府所藏二十有二夏山圖四蜀山圖一山水圖一瀑布圖一秋山樓觀圖二秋山瑞靄圖二秋景漁父圖三山隂宴蘭亭圖三白蘋洲五亭圖一寫楚襄王遇神女圖四關同一名穜長安人畫山水早年師荆浩晚年筆力過浩逺甚尤喜作秋山寒林與其村居野渡幽人逸士漁市山驛使其見者悠然如在灞橋風雪中三峽聞猿時不復有市朝抗塵走俗之狀蓋同之所畫其脫略毫楮筆愈簡而氣愈壯景愈少而意愈長也而深造古淡如詩中淵明琴中賀若非碌碌之畫工所能知當時郭忠恕亦神仙中人也亦師事同授學故筆法不墮近習同於人物非所長於山間作人物多求胡翼為之故同所畫村堡橋彴色色備有而翼因得以附名於不朽也今御府所藏九十有四秋山圖二十二秋晚煙嵐圖二江山漁艇圖二江山行船圖二春山蕭寺圖一秋山霜霽圖四關山老木圖一秋山樓觀圖四秋山楓木圖一秋山漁樂圖四秋江早行圖二秋峰聳秀圖二羣峰秋色圖三竒峰髙寺圖二山舍謳歌圖一山隂行人圖一崦嵫待月圖一林藪逍遙圖一巖隈髙偃圖一嘯傲煙霞圖一岸曲醉吟圖一霧鎖重關圖四窠石平逺圖一楓木峭壁圖一石岸古松圖一松木髙士圖一故實山水圖一夏雨初晴圖二山隂宴蘭亭圖四仙山圖四關山圖一溪山圖一崇山圖一山水圖一山城圖一巨峰圖一竒峰圖一晴峰圖一函關圖一危棧圖一雲巖圖一石淙圖一平橋圖一峻極圖三杜楷一作措成都人善工山水極妙作枯木斷崖雲崦煙岫之態思致頗逺又圖寫昔人詩句為之亦可以想見其胸次耳今御府所藏一翠屏金沙圖宣和畫譜卷十
