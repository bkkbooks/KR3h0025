front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0025_WYG_001-1a, image: WYG0813/WYG0813-0069a.png}
body:
  text: 宣和畫譜卷一道釋敘論志於道據於德依於仁遊於藝藝也者雖志道之士所不能忘然特遊之而已畫亦藝也進乎妙則不知藝之為道道之為藝此梓慶之削鐻輪扁之斫輪昔人亦有所取焉於是畫道釋像與夫儒冠之風儀使人瞻之仰之其有造形而悟者豈曰小補之哉故道釋門因以三教附焉自晉宋以來還迄於本朝其以道釋名家者得四十九人晉宋則顧陸梁隋則張展輩蓋一時出乎其類拔乎其萃者矣至於有唐則吳道元遂稱獨步殆將前無古人五代如曹仲元亦駸駸度越前輩至本朝則繪事之工凌轢晉宋間人物如道士李得柔畫神仙得之於氣骨設色之妙一時名重如孫知微輩皆風斯在下然其餘非不善也求之譜系當得其詳姑以著者槩見於此若趙裔髙文進輩於道釋亦籍籍知名者然裔學朱繇如婢作夫人舉止羞澀終不似真文進蜀人世俗多以蜀畫為名家是虛得名此譜所以黜之道釋一三教鍾馗氏鬼神附晉顧愷之宋陸探微梁張僧繇隋展子虔董伯仁唐閻立德閻立本張孝師范長夀何長夀尉遲乙僧顧愷之字長康小字虎頭晉陵無錫人義熙中為散騎常侍愷之博學有才氣丹青亦造其妙而俗傳謂之三絶畫絶癡絶才絶方時為謝安知名以謂自生民以來未之有也愷之每畫人成或數年不點目睛人問其故答曰四體妍蚩本亡關於妙處傳神寫照正在阿堵中嘗圖裴楷像頰上加三毛觀者覺神明殊勝又為謝鯤像在石巖裏云此子宜置在丘壑中欲圖殷仲堪仲堪有目病固辭愷之曰明府正為眼耳若明點瞳子飛白拂上使如輕雲之蔽月豈不美乎仲堪乃從之嘗於瓦官寺北殿畫維摩詰將畢欲點眸子乃謂寺僧曰不三日觀者所施可得百萬已而果如之杜甫題瓦官寺詩云虎頭金粟影者謂此愷之世以謂天材傑出獨立無偶妙造精微雖荀衛曹張未足以方駕也謝赫以謂迹不逮意聲過於實豈知愷之者惜今罕見其畫蓋愷之深自祕惜如嘗以一厨畫寄桓溫家而後為溫竊取則愷之之畫所以傳於世者宜罕見之也今御府所藏九淨名居士圖一三天女美人圖一夏禹治水圖一黃初平牧羊圖一古賢圖一春龍出蟄圖一女史針圖一斫琴圖一牧羊圖一陸探微吳人也善畫事明帝在左右丹青之妙衆所推稱其名略見於宋書人謂畫有六法自古鮮能足之探微得法為備窮理盡性事絶言象包前孕後古今獨立真萬代之蓍龜衡鑑也議者率以顧陸僧繇為之品第或譬之論書顧陸則鍾張僧繇則逸少也是知書畫同體又曰張得其肉陸得其骨顧得其神言肉則淺言骨則深言神則妙深淺神妙不有間乎探微雖介於二者然托古今之説若兼有之但得骨則精深可知矣豈非顧在前愈於已則陸當居後獨言陸則可以絶人耶探微平生所畫者多愛圖古聖賢像不為無意近時米芾喜論畫嘗謂明白易辨者唯顧陸與吳生詎不信夫二子綏洪綏肅以家學傳授作畫亦工不墜素習綽有父風而終不近也張彥逺謂體運遒舉風力頓挫一點一拂動筆新竒固自不凡矣然能之而不從事於此故傳世者極少嘗於麻紙畫釋迦像為時所珍蓋麻紙緩膚飲墨不受推筆亦丹青家所難宜得譽云洪肅亦紹箕裘見聞習尚往往有不待學而能者名載譜録而所畫不傳豈非為父兄之所掩乎今御府所藏一十無量夀佛像一佛因地圖一降靈文殊像一淨名居士像一托塔天王圖一北門天王圖一天王圖一王獻之像一五馬圖一摩利支天菩薩像一張僧繇吳人也天監中歷官至右將軍吳興太守以丹青馳譽于時方梁武帝以諸王居外每想見其面目即遣僧繇乘傳寫之以歸對之如見其人江陵天皇寺有柏堂僧繇畫盧舍那及孔子像明帝見之怪以孔子參佛氏以問僧繇僧繇對曰他日賴此無恙耳又嘗於金陵安樂寺畫四龍不點目睛謂點即騰驤而去人以謂誕固請點之因為落墨才及二龍果雷電破壁徐視畫已失之矣獨二龍未點睛者在焉世謂僧繇畫骨氣竒偉規模宏逸六法精備當與顧陸並馳爭先僧繇畫釋氏為多蓋武帝時崇尚釋氏故僧繇之畫往往從一時之好今御府所藏十有六佛像一文殊菩薩像三大力菩薩像一維摩菩薩像一佛十弟子圖一十六羅漢像一十髙僧圖一九曜像一鎮星像一天王像一神王像一掃象圖一摩利支天菩薩像一五星二十八宿真形圖一展子虔歷北齊周隋至隋為朝大夫而所畫臺閣雖一時如董展不得以窺其妙寫江山逺近之勢尤工故咫尺有千里趣僧琮謂子虔觸物留情備皆絶妙是能作難寫之狀略與詩人同者也今御府所藏二十北極巡海圖二石勒問道圖一維摩像一法華變相圖一授塔天王圖一摘瓜圖一按鷹圖一故實人物圖二人馬圖一人騎圖一挾彈遊騎圖一十馬圖一北齊後主幸晉陽圖六董展字伯仁汝南人也以才藝稱鄉里號為智海官至光祿大夫殿內將軍尤長於畫雖無祖述不愧前賢夙德名流見者失色但地處平原而無江山之助與戎馬為鄰而無中朝冠冕之儀非其不至也蓋風聲地氣之所習爾伯仁與展子虔齊名于時然董造其微展得其駿展於董之臺閣則不及董於展之車馬則乏所長焉是則董之視展蓋亦猶詩家之李杜也展作道經變相尤為世所稱賞自非畫外有情參靈酌妙入華胥之夢與化人同遊何以臻此今御府所藏一道經變相圖閻立德歷官工部尚書父毗在隋以丹青得名與弟立本家學俱造其妙唐貞觀中東蠻謝元深入朝顔師古奏言昔周武時逺國歸欵乃集其事為王會圖今卉服烏章俱集蠻邸實可圖寫因命立德等圖之其序位之際折旋規矩端簮奉笏之儀與夫鼻飲頭飛人物詭異之狀莫不備該毫末故李嗣真云大安博陵難兄難弟謂立德立本也今御府所藏九採芝太上像一七曜像二遊行天王圖二莊生馬知圖一右軍點翰圖一沈約湖雁詩意二閻立本總章元年以司平太常伯拜右相有應務之才與兄立德以善畫齊名立本尤工於形似初唐太宗與侍臣泛舟春苑池見異鳥容與波上喜見顔色詔坐者賦詩召立本寫焉閣外傳呼畫師閻立本時立本已為主爵郎中俯伏池左研吮丹粉顧視坐者愧與汗下歸戒其子曰吾少讀書文辭不減儕輩今獨以畫見名遂與厮役等若曹慎毋習然性所好欲罷不能也及為右相而薑恪以戰功擢左相故時人有左相宣威沙漠右相馳譽丹青之嘲嘗奉詔寫太宗真容後有善畫者傳於元都觀以鎮九五岡之氣猶可以仰神武之英威也又寫秦府十八學士凌煙閣功臣等悉皆輝映前古時人咸稱其妙嘗作醉道圖或以張僧繇醉僧圖比立本嘗至荆州視僧繇畫曰定虛得名耳明日又往曰猶是近代佳手明日又往曰名下定無虛士坐卧觀之留宿其下十日不能去是猶歐陽詢之見索靖碑也且立本以閣外傳呼畫師至戒其子弟毋習而張彥逺正以魏明帝起凌雲臺勑韋誕題榜竊比其事是豈知言也哉且戴安道碎琴不為王門之伶人而阮千里終日應客不倦議者以安道不如千里之達也然漁陽參撾果可以辱彌衡耶今御府所藏四十有二三清像一元始像二行化太上像一傳法太上像一巖居太上像一四子太上像一太上西升經一拱極圖一玉晨道君像一延夀天尊像一木紋天尊像一北帝像一十二真君像一維摩像二孔雀明王像一觀音感應像一五星像二太白像一房宿像一十二神符一宣聖像一步輦圖一王右軍真一竇建德圖一寫李思摩真一凌煙閣功臣圖一魏徵進諫圖一飛錢驗符圖一取性圖二西域圖二職貢圖二異國鬬寶圖一職貢獅子圖一掃象圖一紫微北極大帝像一混元上德皇帝像一張孝師為驃騎尉善畫嘗死而復生故畫地獄相為尤工是皆冥遊所見非與想像得之者比也吳道玄見其畫因效為地獄變相畫評謂孝師衆制有功未為盡善而地獄變相羣雄推服宜道玄之肯摹倣也然怪力亂神聖人所不語宜孝師以冥遊特紀於畫而不為傳也今御府所藏一傳法太上像范長夀不知何許人學張僧繇畫然能知風俗好尚作田家景候人物皆極其情至於山川形勢屈曲向背分布逺近各有條理而其間室廬放牧之所在牛羊雞犬齕草飲水動作態度生意具焉人謂可以企及僧繇也當時得名甚著官止司人挍尉今御府所藏二醉道圖一醉真圖一何長夀與范長夀同師法故所畫多相類然一源而異派論者次之至於並駕齊驅得名則均也初何與范俱作醉道圖傳於世好事者以僧繇名之蓋必有能辨之者云今御府所藏二辰星像一五嶽真官像一尉遲乙僧吐火羅國胡人也唐朝名畫録作土火羅國歷代名畫記作于闐國人父跋質那乙僧貞觀初其國以善畫薦中都授宿衛官封郡公時人以跋質那為大尉遲乙僧為小尉遲蓋父子皆擅丹青之妙人故以大小尉遲為之别也乙僧嘗於慈惠寺塔前畫千手眼降魔像時號竒蹤然衣冠物像略無中都儀形其用筆妙處遂與閻立本為之上下也蓋立本畫外國妙于前古乙僧畫中國人物一無所聞由是評之優劣為之遂分今御府所藏八彌勒佛像一佛鋪圖一佛從像一外國佛從圖一大悲像一明王像二外國人物圖一宣和畫譜卷一
