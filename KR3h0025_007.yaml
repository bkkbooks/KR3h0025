  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0025_WYG_007-1a, image: WYG0813/WYG0813-0105a.png}
body:
  text: 宣和畫譜卷七人物三宋周文矩石恪李景道李景逰顧閎中顧大中郝澄湯子升李公麟楊日言周文矩金陵句容人也事偽主李煜為翰林待詔善畫行筆瘦硬戰掣有煜書法工道釋人物車服樓觀山林泉石不墮吳曹之習而成一家之學獨士女近類周昉而纎麗過之升元中煜命文矩畫南莊圖覽之歎其精備開寶間煜進其圖藏於祕府有逰春搗衣尉帛繡女等圖傳於世今御府所藏七十有六天蓬像一北斗像一許仙巖遇仙圖三會仙圖一佛因地圖一神仙事迹圖二文殊菩薩像一盧舍那佛像一觀音像一金光明菩薩像一寫偽主李煜真三明皇取性圖二明皇會棊圖一五王避暑圖四寫謝女真一法眼禪師像一阿房宫圖二寫李季蘭真一斫膾圖二火龍烹茶圖四四暢圖一問禪圖一春山圖一重屏圖一聽説圖一魯秋胡故實圖一鍾馗氏小妹圖五髙間圖一文會圖一鍾馗圖二金步搖士女圖一煎茶圖一謝女寫真圖二玉步搖士女圖二詩意繡女圖一寫真士女圖一按樂士女圖三合藥士女圖四理鬟士女圖一按樂宫女圖一按舞圖一玉妃遊仙圖一宫女圖一遊行士女圖一琉璃堂人物圖一慈氏菩薩像二長生保命天尊像一兜率宫內慈氏像一李德裕見劉三復圖一石恪字子專成都人也喜滑稽尚談辨工畫道釋人物初師張南本技進益縱逸不守繩墨氣韻思致過南本逺甚然好畫古僻人物詭形殊狀格雖髙古意務新竒故不能不近乎譎怪孟蜀平至闕下被旨畫相國寺壁授以畫院之職不就力請還蜀詔許之今御府所藏二十有一太上像一鎮星像一羅漢像一四皓圍棊圖一山林七賢圖三遊行天王像一女孝經像八青城遊俠圖二社饗圖二鍾馗氏圖一李景道偽主升之親屬景道其一焉金陵號佳麗地山川人物之秀至于王謝子弟其風流氣習尚可想見景道喜丹青而無貴公子氣蓋亦餘膏賸馥所沾丐而然作會友圖頗極其思故一時人物見於燕集之際不減山隂蘭亭之勝今御府所藏一會友圖李景逰亦偽主升之親屬與景道其季孟行也一時雅尚頗與景道同好畫人物極勝作談道圖風度不凡飄然有仙舉之狀璟嗣升而諸昆弟皆王獨景遊不見顯封其畫世亦罕得其本今御府所藏一談道圖顧閎中江南人也事偽主李氏為待詔善畫獨見於人物是時中書舍人韓熙載以貴遊世胄多好聲伎専為夜飲雖賔客揉雜歡呼狂逸不復拘制李氏惜其才置而不問聲傳中外頗聞其荒縱然欲見樽俎燈燭間觥籌交錯之態度不可得乃命閎中夜至其第竊窺之目識心記圖繪以上之故世有韓熙載夜宴圖李氏雖僣偽一方亦復有君臣上下矣至於寫臣下私褻以觀則泰至多竒樂如張敞所謂不特畫眉之説已自失體又何必令傳於世哉一閲而棄之可也今御府所藏五明皇擊梧桐圖四韓熙載夜宴圖一顧大中江南人也善畫人物牛馬兼工花竹嘗於南陵巡捕司舫子卧屏上畫杜牧詩南陵水面漫悠悠風緊雲繁欲變秋正是客心孤迥處誰家紅袖憑江樓殊有思致見者愛之而人初不知其名未甚加重後為過客宿舫中因竊去乃更歎息然其他畫在世者不多有顧閎中亦善畫疑其族屬也今御府所藏一韓熙載縱樂圖郝澄字長源金陵句容人也得人倫風鑒之術故於畫尤長傳寫蓋傳寫必於形似而畫者往往乏神氣澄於形外獨得精神氣骨之妙故落筆過人澄力學逮二十年而筆墨乃工聲譽益進作道釋人馬世多傳其本清徑善設色今御府所藏一十有四寫北極像一神仙事迹一出獵圖三人馬圖二渲馬圖六牧放散馬圖一湯子升蜀人也畫山水人物頗工志慕髙逸多繪方外事作文蕭彩鸞圖飄飄然仙風道骨與夫煙雲縹眇之狀便覺西山爽氣恍然在目有鑄鑑圖傳於世至理所寓妙與造化相參非徒為丹青而已者今御府所藏二文蕭彩鸞冥會圖鑄鑑圖文臣李公麟字伯時舒城人也熙寧中登進士第父虛一嘗舉賢良方正科任大理寺丞贈左朝議大夫喜藏法書名畫公麟少閲視即悟古人用筆意作真行書有晉宋楷法風格繪事尤絶為世所寶博學精識用意至到凡目所覩即領其要始畫學顧陸與僧繇道玄及前世名手佳本至磐礴胸臆者甚富乃集衆所善以為己有更自立意專為一家若不蹈襲前人而實隂法其要凡古今名畫得之則必摹臨蓄其副本故其家多得名畫無所不有尤工人物能分别狀貌使人望而知其廊廟館閣山林草野閭閻臧獲臺輿皂𨽻至於動作態度顰伸俯仰小大美惡與夫東西南北之人才分點畫尊卑貴賤咸有區别非若世俗畫工混為一律貴賤妍醜止以肥紅瘦黑分之大抵公麟以立意為先布置緣飾為次其成染精緻俗工或可學焉至率略簡易處則終不近也蓋深得杜甫作詩體制而移於畫如甫作縛雞行不在雞蟲之得失乃在於注目寒江倚山閣之時公麟畫陶潛歸去來兮圖不在於田園松菊乃在於臨清流處甫作茅屋為秋風所拔歎雖衾破屋漏非所恤而欲大庇天下寒士俱歡顔公麟作陽關圖以離别慘恨為人之常情而設釣者於水濵忘形塊坐哀樂不關其意其他種種類此唯覽者得之故創意處如吳生瀟灑處如王維謂華嚴會人物可以對地獄變相龍眠山莊可以對輞川圖是也此皆托前輩精絶處會之在已宜出塵表然所傳於世者甚多人人得以考究公麟初喜畫馬大率學韓幹略有損增有道人教以不可習恐流入馬趣公麟悟其旨更為道佛尤佳嘗寫騏驥院御馬如西域于闐所貢好頭赤錦膊驄之類寫貌至多至圍人懇請恐并為神物取去由是先以畫馬得名仕宦居京師十年不遊權貴門得休沐遇佳時則載酒出城拉同志二三人訪名園蔭林坐石臨水翛然終日當時富貴人欲得其筆迹者往往執禮願交而公麟靳固不答至名人勝士則雖昧平生相與追逐不厭乘興落筆了無難色又畫古器如圭璧之類循名考實無有差謬從仕三十年未嘗一日忘山林故所畫皆其胸中所藴晚得痺疾呻吟之餘猶仰手畫被作落筆形勢家人戒之笑曰餘習未除不覺至此其篤好如此病少間求畫者尚不已公麟歎曰吾為畫如騷人賦詩吟咏情性而已奈何世人不察徒欲供玩好耶後作畫贈人往往薄著勸戒於其間與君平賣卜諭人以禍福使之為善同意歿後畫益難得至有厚以金帛購之者由是夤緣摹倣偽以取利不深於畫者率受其欺然不能逃乎精鑒官至朝奉郎致仕卒于家至今四方士大夫稱之不名以字行又自號龍眠居士王安石取人慎許可與公麟相從於鍾山及其去也作四詩以送之頗被稱賞考公麟平生所長其文章則有建安風格書體則如晉宋間人畫則追顧陸至於辨鍾鼎古器博聞強識當世無與倫比頃時段義得玉璽來上衆未能辨公麟先識之士論莫不歎服以沈於下僚不能聞達故止以畫稱今故詳載以明其出處云今御府所藏一百有七寫大梵天像二揭帝神像一不動尊變相一護法神像五觀音像三瑞像佛一華嚴經相六金剛經相一維摩居士像一無量夀佛像一禪會圖一釋迦佛像一菩薩像一寫摩耶夫人像一緇衣圖一親近菩薩像二寫王維看雲圖一寫十國圖二寫義之書扇圖一寫盧鴻草堂圖一寫王維歸嵩圖一蔡琰還漢圖一寫王維像一寫職貢圖二山莊圖一書裙圖一歸去來兮圖二陽關圖一四皓圍棊圖一織錦回文圖一女孝經相二醉僧圖一玉津訪石圖一孝經相一寫三石圖一玻璃鑑圖一寫生折枝花二杏花白鷴圖一天育驃騎圖一寫唐九馬圖一昭君出塞圖一姑射圖一五王醉歸圖一豢龍氏圖一寫玉蝴蝶圖一御風真人圖一遊騎圖一小筆逰戲圖一弄驕人馬圖一習馬圖一二馬圖一馬性圖一寫韓幹馬圖二調習人馬圖一北岸贈行馬圖一寫東丹王馬圖一天馬圖一人馬圖二呈馬圖一番騎圖一九歌圖一祖師傳法授衣圖一彌陀觀音勢至像一寫摩奴舍夫人像一五星二十八宿像一寫十大弟子像十摹吳道玄護法神像二摹唐李昭道海岸圖一摹吳道玄四護法神像四摹唐李昭道摘瓜圖一王安石定林蕭散圖一丹霞訪龎居士圖一寫徐熙四面牡丹圖一摹北塞贊華蕃騎圖一內臣楊日言字詢直家世開封人日言幼而有立喜經史尤得於春秋之學吐辭涉事雖詞人墨卿皆願從之遊作篆𨽻八分可以追配古人尤於小筆妙得其趣其寫貌益精方仕宦未達而神考識之拔擢為左右之漸於殿廬傳寫古昔君臣賢哲繪像欽聖憲肅及建中靖國以欽慈皇太后寫真顧畫史無有髣佛其儀容者命日言追寫既落墨左右環觀皆以手加額繼之以泣歎其儼然如生其精絶有至於是者作山林泉石人物荒逺蕭散氣韻髙邁非世俗之畫得以擬倫也官至中亮大夫晉州觀察使致仕贈昭化軍節度使諡莊簡今御府所藏四秋山平逺圖一溪橋髙逸圖一士女圖二宣和畫譜卷七
