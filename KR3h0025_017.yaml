body:
  text: 宣和畫譜卷十七花鳥三宋李煜黃居寀丘慶餘徐熙徐崇嗣徐崇矩唐希雅唐忠祚江南僞主李煜字重光政事之暇寓意于丹青頗到妙處自稱鍾峯隱居又略其言曰鍾隱後人遂與鍾隱畫溷淆稱之然李氏能文善書畫書作顫筆樛曲之狀遒徑如寒松霜竹謂之金錯刀畫亦清爽不凡别為一格然書畫同體故唐希雅初學李氏之錯刀筆後畫竹乃如書法有顫掣之狀而李氏又復能為墨竹此互相取備也其畫雖傳於世者不多然推類可以想見至於畫風虎雲龍圖者便見有霸者之略異於常畫蓋不期至是而志之所之有不能遏者自非吾宋以德服海內而率土歸心者其孰能制之哉今御府所藏九自在觀音像一雲龍風虎圖一柘竹雙禽圖一柘枝寒禽圖一秋枝披霜圖一寫生鵪鶉圖一竹禽圖一棘雀圖一色竹圖一黃居寀字伯鸞蜀人也筌之季子筌以畫得名居寀遂能世其家作花竹翎毛妙得天真寫怪石山景往往過其父逺甚見者皆爭售之唯恐後故居寀之畫得之者尤冨初事西蜀僞主孟昶為翰林待詔遂圖畫墻壁屏幛不可勝紀既隨僞主歸闕下藝祖知其名尋賜真命太宗尤加眷遇仍委之搜訪名畫詮定品目一時等輩莫不斂衽筌居寀畫法自祖宗以來圖畫院為一時之標凖較藝者視黃氏體製為優劣去取自崔白崔慤吳元瑜既出其格遂大變今御府所藏三百三十有二春山圖六春岸飛花圖二竹石春禽圖一夾竹桃花圖二桃竹山鷓圖二桃花竹鸂鶒圖三杏花鸚鵡圖一桃竹鵓鴿圖一桃花御鷹圖二桃竹野鷂圖一桃花鷯子圖二海棠錦雞圖二海棠竹鶴圖二海棠家鴿圖二海棠山鷓圖二海棠鸚鵡圖一夾竹海棠圖一筍竹錦雞圖一牡丹圖三牡丹雀貓圖二牡丹鸚鵡圖一牡丹竹鶴圖六牡丹錦雞圖五牡丹山鷓圖四牡丹鵓鴿圖八牡丹黃鶯圖二牡丹雀鴿圖一牡丹戲貓圖三蜂蝶戲貓圖一芍藥圖一萱草鸂鶒圖二戲蝶貓圖一葵花錦雞圖一桃竹銅觜圖一寫生棕竹圖一寫蜀葵花圖三寫生鸂鶒圖一竹鶴湖石圖二竹石青鶻圖三竹石雙鶴圖二竹石錦鳩圖一竹石鶉雀圖一竹石山鷓圖三竹石雛雀圖一竹石野雉圖一竹石貓雀圖一竹石圖四竹石黃鸝圖一竹石白鶻圖三竹石貓圖一水石鸂鶒圖二水石鷺鷥圖三戲水鸂鶒圖一雛雀鸂鶒圖一鸂鶒圖一筍竹雀兔圖一雀竹圖一雀竹鸂鶒圖二竹鶴圖二十一筍竹圖一詩意山水圖一竹禽圖一辛夷湖石圖一湖灘墨竹圖一筍竹鸂鶒圖二引雛鸂鶒圖一隴禽圖一湖灘煙禽圖一藥苗圖一雜禽圖一折枝花圖一雜花圖四子母貓圖一竹筍雛雀圖一寫生貓圖一捕雀貓圖一蓮塘鸂鶒圖一獵騎圖二躑躅雙雉圖一躑躅鵓鴿圖四躑躅山鷓圖一躑躅雉雞圖一錦棠竹鶴圖二寫真士女圖一寫生盆池圖一寫生龜圖一寫瑞兔圖一捕魚霜鷺圖一山水鷺鷥圖二溪石雙鷺圖二捕魚雙鷺圖一望仙躑躅圖一漁鷺圖一鷺鷥圖二山鷓棘雀圖一古木山鷓圖一棘雀圖一鷙禽穴狐圖三六鶴圖一柘棘翎毛圖一夀松雙鶴圖一雙鶴圖二架上鷹圖六御鷹圖四架上鷂子圖一架上鸚鵡圖一鷹狐圖二雞鷹圖三皂鵰圖六白鶻圖二鵰狐圖十二俊禽逐鷺圖一灘石繡纓圖二碎金圖一桃花鶻圖一秋景芙蓉圖八芙蓉鷺鷥圖二芙蓉鸂鶒圖一芙蓉雙鷺圖一拒霜圖四翠碧芙蓉圖一湖灘鷺鷥圖一鷺鶻圖四紅蕉湖石圖一水葒鷺鶻圖三雞冠花圖一髙秋鷙禽圖三秋山圖一秋岸圖三秋禽圖三寒菊鷺鷥圖一寒菊鸂鶒圖二蘆菊圖一寒菊鷯子圖一寒菊雙鷺圖二寒菊圖一雪竹鷯子圖二雪雀圖五雪景鷯子圖一雪鷺寒雀圖一山茶雪兔圖一山茶雪雀圖一雪禽圖二雪兔圖二雪竹野雉圖二摹七十二賢圖一水月觀音像一自在觀音像一寒林才子圖一水墨竹石鶴圖一藥苖引雛鴿圖一夏景筍竹圖三湖石牡丹圖五山隂避暑宫殿圖二寫生金瓶魏花圖一湖石金盆鵓鴿圖一牡丹金盆鷓鴣圖二牡丹太湖石雀圖二順風牡丹黃鸝圖一小景竹石水禽圖一水石山鷓鷺鷥圖三蘆花寒菊鷺鷥圖四丘慶餘本西蜀人文播之子善畫花竹翎毛等物最工而兼長於草蟲凡設色者已逼於動植至其草蟲獨以墨之淺深映發亦極形似之妙風韻髙雅為世所推初師滕昌祐及晚年遂過之人謂其得意處不减徐熙也因事江南僞主李氏後隨李氏歸朝今御府所藏四十有三夾竹桃花圖一湖石海棠圖一忘憂圖一四時花禽圖四竹木五禽圖一月季玳瑁圖一月季貓圖一竹石戲貓圖一梅花戴勝圖一折枝花圖一葵花竹鶴圖一牽牛夾竹圖一山茶花兔圖二折枝芙蓉圖二芙蓉禽兔圖一芙蓉山鷓圖二猿雀芙蓉圖一秋蘆鴈鵝圖三湖石山茶圖一山茶鸂鶒圖一雪梅山茶圖一古木雙兔圖一胡桃猿圖一棘雀霜兔圖一朝雞圖一鴈鵝圖二鶻鴨圖一竹禽圖一拒霜圖四寫生花圖一寒菊圖一徐熙金陵人世為江南顯族所尚高雅寓興閒放畫草木蟲魚妙奪造化非世之畫工形容所能及也嘗徜徉遊於園圃間每遇景輒留故能傳寫物態蔚有生意至於芽者甲者華者實者與夫濠梁噞喁之態連昌森束之狀曲盡真宰轉鈞之妙而四時之行蓋有不言而傳者江南僞主李煜銜壁之初悉以熙畫藏之於內帑且今之畫花者往往以色暈淡而成獨熙落墨以寫其枝葉蘂蕚然後傅色故骨氣風神為古今之絶筆議者或以謂黃筌趙昌為熙之後先殆未知熙者蓋筌之畫則神而不妙昌之畫則妙而不神兼二者一洗而空之其為熙歟梅堯臣有詩名亦慎許可至詠熙所畫夾竹桃花等圖其詩曰花留蜂蝶竹有禽三月江南看不足徐熙下筆能逼真繭素畫成才六幅又云年深粉剝見墨縱描寫工夫始驚俗至卒章乃曰竹真似竹桃似桃不待生春長在目以此知熙畫為工矣熙之孫崇嗣崇勳亦頗得其所傳焉今御府所藏二