  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0025_WYG_006-1a, image: WYG0813/WYG0813-0100a.png}
body:
  text: 宣和畫譜卷六人物二唐周昉王朏韓滉趙溫其杜庭睦吳侁鍾師紹五代趙嵓本名霖杜霄丘文播丘文曉阮郜童氏周昉字景元長安人也傳家閥閲以世胄出處貴遊間寓意丹青頗馳譽當代兄皓善騎射因戰功授執金吾德宗召皓謂曰卿弟昉善畫欲令畫章欽寺神卿可特言之經數月帝又諭之方就畫其珍重如此初昉落墨時徹去幄帟使往來縱觀之又寺接國門賢愚畢至或言妙處或指擲未至衆目助其得失昉隨所聞改定月餘是非語絶遂下筆成之無復瑕纇當時推為第一其後郭子儀壻趙縱嘗令韓幹寫照衆謂逼真及令昉畫又復過之一日子儀俱列二畫於壁俟其女歸寧詢所畫謂誰女曰趙郎也問幹所寫曰此得形似問昉所畫曰此兼得精神姿制爾於是優劣顯然昉於諸像精意至於感通夢寐示現相儀傳諸心匠此殆非積習所能致故俗畫摹臨莫克髣佛至於傳寫婦女則為古今之冠其稱譽流播往往見於名士詩篇文字中昉生平圖繪甚多而散逸為不少貞元來已有新羅國人於江淮間以善價求昉畫而去世謂昉畫婦女多為豐厚態度者亦是一蔽此無他昉貴遊子弟多見貴而美者故以豐厚為體而又關中婦人纎弱者為少至其意穠態逺宜覽者得之也此與韓幹不畫瘦馬同意今御府所藏七十有二天地水三官像六五星真形圖一五星圖一五曜圖一四方天王像四降塔天王圖三托塔天王像四星官像一天王像二授塔天王圖一六丁六甲神像四九子母圖三寫金德像一北極大帝聖像一行化老君像一明皇騎從圖一楊妃出浴圖一三楊圖一織錦回文圖一豫遊圖一五陵逰俠圖一蠻夷職貢圖二烹茶圖一宫女圖二宫騎圖一逰春士女圖一烹茶士女圖一憑欄士女圖一橫笛士女圖一舞鶴士女圖一紈扇士女圖一避暑士女圖一覽照士女圖一逰行士女圖一吹簫士女圖一遊戲士女圖一圍棊繡女圖一天竺女人圖一􅀢林圖二寫武后真一按舞圖三藥欄石林圖一妃子教鸚鵡圖一寶塔出雲天王像一北方毗沙門天王像一明皇鬭雞射烏圖一白鸚鵡踐雙陸圖一北齊髙歡帝幸晉陽宫圖一王朏太原人官止劍州刺史喜丹青之習師周昉然精密則視昉為不及一時如趙博文皆昉髙弟也然朏過博文逺甚今御府所藏十明皇燕居圖一明皇斫膾圖三寫唐帝后真一太真禁牙圖一寫卓文君真一避暑士女圖一士女家景圖二韓滉字太沖官止撿挍左僕射同中書門下平章事退食之暇好鼓琴書得張顛筆法畫與宗人韓幹相埒其畫人物牛馬尤工昔人以謂牛馬目前近習狀最難似滉落筆絶人然世罕得之蓋滉嘗自言不能定筆不可論書畫以非急務故自晦不傳於人今御府所藏三十有六李德裕見客圖一七才圖一才子圖二孝行圖二醉學士圖一田家風俗圖一田家移居圖一髙士圖一村社圖一豐稔圖三村社醉散圖一風雨僧圖一逸人圖一堯民擊壤圖二醉客圖一瀟湘逢故人圖一村夫子移居圖一村童戲蟻圖一雪獵圖一漁父圖一集社鬬牛圖二歸牧圖五古岸鳴牛圖一乳牛圖三趙溫其成都人也父公祐以畫稱溫其幼而頴秀家學益工溫其子德齊亦以畫世其家時名不減父祖大中初溫其於大聖慈寺繼父之蹤畫天王帝釋筆法臻妙世稱髙絶今御府所藏二焚誦士女圖一烹酩士女圖一杜庭睦不知何許人也以畫傳於世道釋人物最為世目之近習者而工之為尤難自吳道元號為絶筆學者隨其所得各自名家庭睦復喜寫故實畫明皇斫膾圖人物品流見之風神氣骨間非有得於心者何以臻妙至此今御府所藏一明皇斫膾圖吳侁不知何許人也作泉石平逺溪友釣徒皆有幽致傳其蕭翼蘭亭圖人品輩流各有風儀披圖便能想見一時行記歷歷在目信乎書畫之並傳有所自來也今御府所藏一蕭翼蘭亭圖鍾師紹蜀人也妙丹青畫道釋人物犬馬頗工三代而下禮儀綿蕝至唐盛時雖房杜不敢議師紹乃能作尚齒圖豈無激而然所謂禮失而求諸野今於師紹見之今御府所藏一尚齒圖梁駙馬都尉趙嵓本名霖後改今名喜丹青尤工人物格韻超絶非尋常畫工所及有漢書西域傳彈棊診脈等圖傳于世非胸次不凡何能遂脫筆墨畛域耶今御府所藏六調馬圖一臂鷹人物圖一五陵按鷹圖四杜霄善畫得周昉筆法為多尤工蜂蝶及曲眉豐臉之態有秋千撲蝶吳王避暑等圖傳於世蓋蜂蝶之畫其妙在粉筆約略間故難得者態度非風流藴藉有王孫貴公子之思致者未易得之故蛺蝶圖唐獨稱滕王要非鐵石心腸者所能作此婉媚之妙也今御府所藏十有二撲蝶圖八撲蝶士女圖一撲蝶士女圖二遊行士女圖一丘文播廣漢人也又名潛與弟文曉俱以畫得名初工道釋人物兼作山水其後多畫牛齕草飲水卧與奔乳牸放牧皆曲盡其狀嘗為銜果鼠一時稱為竒絶今已散逸莫知所在今御府所藏二十有五文會圖四豐稔圖一六逸圖四七才子圖二維摩化身圖一維摩示疾圖一松下逍遙圖一田家移居圖一渡水僧圖一驪山老母像一三笑圖一牧牛圖三逸牛圖一乳牛圖二水牛圖一丘文曉廣漢人文播弟也工道釋一時與文播齊名山水亦工要皆髙世之習道家之仙風釋氏之慈相山川之神秀其非有得於心則未有能到其妙也今成都廣漢間文曉筆迹尤多亦喜畫牧牛蓋釋氏以觀性此所以見畫於文曉焉今御府所藏四渡水羅漢像一故實人物圖一牧牛圖二阮郜不知何許人也入仕為太廟齋郎善畫工寫人物特於士女得意凡纎穠淑婉之態萃於毫端率到閫域作女仙圖有瑶池閬苑風景之趣而霓旌羽蓋飄飄凌雲萼緑雙成可以想像衰亂之際尤不可得但傳於世者甚少今御府所藏四女仙圖一逰春士女圖三婦人童氏江南人也莫詳其世系所學出王齊翰畫工道釋人物童以婦人而能丹青故當時縉紳家婦女往往求寫照焉有文士題童氏畫詩曰林下材華雖可尚筆端人物更清妍如何不出深閨裏能以丹青寫外邊後不知所終今御府所藏一六隱圖一宣和畫譜卷六
