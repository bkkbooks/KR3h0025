  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0025_WYG_008-1a, image: WYG0813/WYG0813-0112a.png}
body:
  text: 宣和畫譜卷八宫室敘論上古之世巢居穴處未有宫室後世有作乃為宫室臺榭户牖以待風雨人不復營巢窟以居蓋嘗取易之大壯故宫室有量臺門有制而山節藻棁雖文仲不得以濫也畫者取此而備之形容豈徒為是臺榭户牖之壯觀者哉雖一點一筆必求諸繩矩比他畫為難工故自晉宋迄于梁隋未聞其工者粵三百年之唐歷五代以還僅得衛賢以畫宫室得名本朝郭忠恕既出視衛賢輩其餘不足數矣然忠恕之畫髙古亦未易世俗所能知其不見而大笑者亦鮮焉若夫刳木為舟剡木為楫與其車輿之制凡涉於度數而近類夫宫室者因附諸此自唐五代而至本朝畫之傳者得四人信夫畫之中規矩凖繩者為難工遊規矩凖繩之內而不為所窘如忠恕之髙古者豈復有斯人之徒歟後之作者如王瓘燕文貴王士元等輩故可以皂𨽻處因不載之譜宫室舟車附唐尹繼昭五代胡翼衛賢宋郭忠恕尹繼昭不知何許人工畫人物臺閣冠絶當世蓋専門之學耳至其作姑蘇臺阿房宫等不無勸戒非俗畫所能到而千棟萬柱曲折廣狹之制皆有次第又隱算學家乘除法於其間亦可謂之能事矣然考杜牧所賦則不無太過者騷人著戒尤深逺焉畫有所不能既也今御府所藏四漢宫圖一姑蘇臺圖二阿房宫圖一胡翼字鵬雲工畫道釋人物至於車馬樓臺種種臻妙趙嵓都尉以畫著名一時見翼禮遇加厚喜臨摹古今名筆目之曰安定鵬雲記有秦樓吳宫盤車等圖傳於世今御府所藏八秦樓吳宫圖六盤車圖二衛賢長安人江南李氏時為內供奉長於樓觀人物嘗作春江圖李氏為題漁父詞於其上至其為髙崖巨石則渾厚可取而皴法不老為林木雖徑挺而枝梢不稱其本論者少之然至妙處復謂唐人罕及要之所取為多焉今御府所藏二十有五黔婁先生圖一楚狂接輿圖一老萊子圖一王仲孺圖一於陵子圖一梁伯鸞圖一羅漢圖一溪居圖一雪宫圖一山居圖一閘口盤車圖一雪岡盤車圖一竹林髙士圖一雪江髙居圖一雪景樓觀圖一雪景山居圖二渡水羅漢像一神仙事迹圖二嵓僧圖一蜀道圖二盤車圖二郭忠恕字國寶不知何許人柴世宗朝以明經中科第歷官迄國朝太宗喜忠恕名莭特遷國子博士忠恕作篆𨽻凌轢晉魏以來字學喜畫樓觀臺榭皆髙古置之康衢世目未必售也頃錢塘有沈姓者收忠恕畫每以示人則人輒大笑歷數年而後方有知音者謂忠恕筆也如韓愈之論文以謂時時應事作下俗文章下筆令人慙及示人以為好惜古文之難知也如此今於忠恕之畫亦云忠恕隱於畫者其謫官江都踰旬失其所在後閲數歲陳搏會于華山而不復聞蓋亦仙去矣今御府所藏三十有四尹喜問道圖一明皇避暑宫圖四避暑宫殿圖四山隂避暑宫圖四飛仙故實圖一九曜像一雪山佛剎圖一山居樓觀圖一織錦璇璣圖三湖天夏景圖二車棧橋閣圖一水閣晴樓圖一行宫圖二吹簫圖一樓觀士女圖三滕王閣王勃揮毫圖四番族敘論解縵胡之纓而斂衽魏闕袖操戈之手而思稟正朔梯山航海稽首稱藩願受一㕓而為氓至有遣子弟入學樂率貢職奔走而來賔者則雖異域之逺風聲氣俗之不同亦古先哲王所未嘗或棄也此番族所以見於丹青之傳然畫者多取其佩弓刀挾弧矢遊獵狗馬之玩若所甚貶然亦所以陋蠻夷之風而有以尊華夏化原之信厚也今自唐至本朝畫之有見於世者凡五人唐有胡瓌胡虔至五代有李贊華之流皆筆法可傳者蓋贊華系出北番是為東丹王故所畫非中華衣冠而悉其風土故習是則五方之民雖器械異制衣服異宜亦可按圖而考也後有髙益趙光輔張戡與李成輩雖馳譽於時然光輔以氣骨為主而格俗戡成全拘形似而乏氣骨皆不兼其所長故不得入譜云番族番獸附唐胡瓌胡虔五代李贊華王仁夀房從真胡瓌范陽人工畫番馬鋪敘巧密近類繁冗而用筆清徑至於穹廬什器射獵部屬纎悉形容備盡凡畫驝駝及馬等必以狼毫製筆疏染取其生意亦善體物者也有隂山七騎下程盜馬射雕等圖傳于世其後以筆法授子虔梅堯臣嘗題瓌畫胡人下馬圖其略云氊廬鼎列帳幕圍鼓角未吹驚塞鴻又云素紈六幅筆何巧胡瓌妙畫誰能通則堯臣之所與故知瓌定非淺淺人也今御府所藏六十有五卓歇圖二牧馬圖十番部驝駝圖一番騎圖六秋陂牧馬圖一番部盜馬圖一番部早行圖二番部牧馬圖一番族獵射騎圖一射騎圖一報塵圖一起塵番馬圖一番部下程圖七番部卓歇圖三番部射雕圖二卓歇番族圖一射雕雙騎圖一轉坡番騎圖一沙缸牧駝圖一出獵番騎圖一獵射圖六牧駝圖一番部按鷹圖一毳幕卓歇圖一番族牧馬圖一番部汲泉圖一牧放平逺圖一牧馬番卒圖一按鷹圖二對馬圖一平逺番部卓歇圖二獵射番族人馬圖一平逺射獵七騎圖一胡虔范陽人學父瓌畫番馬得譽世以謂虔丹青之學有父風蓋瓌以七騎下程射雕盜馬等圖傳於世故知虔家學之妙殆未可分真贋也今御府所藏四十有四番部下程圖八番族下程圖一番部卓歇圖五番部起程圖一番族起程圖三番族卓歇圖四平逺獵騎圖一番部盜馬圖一番部牧放圖三射雕番騎圖一汲水番騎圖一射獵番族圖一牧放番族圖一番族按鷹圖一射雕圖一獵騎圖二番騎圖四番馬圖一簇帳番部圖一番族獵騎圖二平逺射獵七騎圖一李贊華北番東丹王初名突欲保機之長子唐同光中從其父攻渤海扶餘城下之改為東丹國以突欲為東丹王避嗣主德光之逼逐遂越海抵登州而歸中國時唐明宗長興六年十二月也明宗賜與甚厚仍賜姓東丹名慕華以其來自遼東乃以瑞州為懷化軍拜懷化軍節度使瑞慎等州觀察使又賜姓李更名贊華始泛海歸中國載書數千卷自隨尤好畫多寫貴人酋長至於袖戈挾彈牽黃臂蒼服用皆縵胡之纓鞍勒率皆瓌竒不作中國衣冠亦安於所習者也然議者以謂馬尚豐肥筆乏壯氣其確論歟今御府所藏十有五雙騎圖一獵騎圖一雪騎圖一番騎圖六人騎圖二千角鹿圖一吉首並驅騎圖一射騎圖一女真獵騎圖一王仁夀汝南宛人石晉時作待詔倣吳生畫為佛廟鬼神及馬等嘗於相國寺淨土院畫八菩薩人輒謂之吳生不復有辨之者以此知其所學之淺深也既作浮屠氏畫則多在屋壁堂殿間歲月浸久隨以隳壞故存者絶少今御府所藏一駝房從真成都人工畫人物番騎嘗於蜀宫幛壁間作諸葛亮引兵渡瀘布置甲馬恍若生動近時張戡番馬所以精者以戡朔方人耳今從真蜀人而能番馬族帳非其所見亦不易得至於幛壁仍異縑楮皆其難者尤宜賞激焉惜乎緘櫝不能祕隨時湮沒也今御府所藏八番族卓歇圖一寫西域人馬圖一卓歇圖二調馬打毬圖一薛濤題詩圖一捕魚圖一寫唐明皇真一宣和畫譜卷八
