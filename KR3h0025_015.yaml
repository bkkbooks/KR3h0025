body:
  text: 宣和畫譜卷十五花鳥敘論五行之精粹於天地之間隂陽一嘘而敷榮一吸而揫斂則葩華秀茂見於百卉衆木者不可勝計其自形自色雖造物未嘗庸心而粉飾大化文明天下亦所以觀衆目協和氣焉而羽蟲有三百六十聲音顔色飲啄態度逺而巢居野處眠沙泳浦戲廣浮㴱近而穿屋賀厦知歲司晨啼春噪晩者亦莫知其幾何此雖不預乎人事然上古采以為官穪聖人取以配象類或以著為冠冕或以畫於車服豈無補於世哉故詩人六義多識於鳥獸草木之名而律歴四時亦記其榮枯語黙之候所以繪事之妙多寓興于此與詩人相表裏焉故花之於牡丹芍藥禽之於鸞鳳孔翠必使之富貴而松竹梅菊鷗鷺鴈鶩必見之幽閒至於鶴之軒昂鷹隼之擊搏楊栁梧桐之扶疎風流喬松古柏之歲寒磊落展張於圖繪有以興起人之意者率能奪造化而移精神遐想若登臨覽物之有得也今集自唐以來迄于本朝如薛鶴郭鷂邊鸞之花至黄荃徐熙趙昌崔白等其俱以是名家者班班相望共得四十六人其出處之詳皆各見于傳淺㴱工拙可按而知耳若牛戩李懐衮之徒亦以畫花鳥為時之所知戩作百雀圖其飛鳴俛啄曲盡其態然工巧有餘而殊乏髙韻懐衮設色輕薄獨以柔婉鮮華為有得若取之於氣骨則有所不足故不得附名于譜也花鳥一唐滕王元嬰薛稷邊鸞于錫梁廣蕭悦刁光周滉五代胡擢梅行思郭乾暉郭乾祐滕王元嬰唐宗室也善丹青喜作蜂蝶朱景元嘗見其粉本謂能巧之外曲盡精理不敢第其品格唐王建作宫詞云傳得滕王蛺蝶圖者謂此也今御府所藏一蜂蝶圖薛稷字嗣通乃河東汾隂人收之從子也少有才藻為流輩所推外祖魏正家藏書畫甚多至於表疏之類無所不有皆虞世南褚遂良真蹟稷既飫觀遂鋭意學之而書畫竝進善花鳥人物雜畫而尤長於鶴故言鶴必穪稷以是得名且世之飬鶴者多矣其飛鳴飲啄之態度宜得之為詳然畫鶴少有精者凡頂之淺㴱氅之黳淡喙之長短脛之細大膝之髙下未嘗見有一一能冩生者也又至於别其雄雌辨其南北尤其所難雖名手號為善畫而畫鶴以托爪傳地亦其失也故稷之於此頗極其妙宜得名于古今焉昔李杜以文章妙天下而李太白有稷之畫讚杜子美有稷之鶴詩皆傳于世葢不識其人視其所與信不誣矣稷在睿宗朝歴官至太子少保封晉國公唐史自有傳今御府所藏七啄苔鶴圖一顧步鶴圖一鶴圖五邊鸞長安人以丹青馳譽于時尤長於花鳥得動植生意徳宗時有新羅國進孔雀善舞召鸞寫之鸞於賁飾彩翠之外得婆娑之態度若應節奏又作折枝花亦曲盡其妙至于蜂蝶亦如之大抵精于設色如良工之無斧鑿痕耳然以技困窮卒不獲用轉徙於澤潞間隨時施宜乃畫帶根五參亦極工巧近時米芾論畫花者亦謂鸞畫如生今御府所藏三十有三躑躅孔雀圖一鷓鴣藥苖圖一孔雀圖一木瓜雀禽圖一梨花鵓鴿圖一木筆鵓鴿圖一金盆孔雀圖一木瓜花圖一花鳥圖一菜蝶圖二木瓜圖一葵花圖一鷙禽圖一鵲鷂圖一冩生鵓鴿圖一花苖鵓鴿圖一芭蕉孔雀圖二李子花圖一折枝李實圖一梅花鶺鴒圖一牡丹圖一牡丹白鷴圖一牡丹孔雀圖一梨花圖一千葉桃花圖一冩生折枝花圖一花竹禽石圖二鷺下蓮塘圖二石榴猴鼠圖一于錫不知何許人也善畫花鳥最長于鷄極臻其妙有牡丹雙鷄雪梅雙雉二圖鷄家禽故作牡丹雉野禽故作雪梅莫不有理焉今御府所藏二牡丹雙雞圖一雪梅雙雉圖一梁廣不知何許人也善畫花鳥名載譜録為一時所穪故鄭谷作海棠詩有梁廣丹青㸃筆遲之句也谷以詩名家不妄許可谷既穪道廣之畫可見矣今御府所藏五四季花圖一夾竹來禽圖一海棠花圖三蕭悦不知何許人也時官為協律郎人皆以官稱其名謂之蕭協律唯喜畫竹㴱得竹之生意名擅當世白居易詩名擅當世一經題品者價增數倍題悦畫竹詩云舉頭忽見不似畫低耳静聴疑有聲其被推穪如此悦之畫可想見矣今御府所藏五烏節照碧圖二梅竹鶉鷯圖一風竹圖一筍竹圖一刁光長安人自天復初入蜀善畫湖石花竹貓兎鳥雀之類慎交游所與者皆一時之佳士如黄荃孔嵩皆師事之議者以謂孔類升堂黄得入室其知言哉年踰八十益不廢所學今蜀郡僧寺中壁間花竹往往尚有存者今御府所藏二十有四花禽圖五芙蓉鸂鶒圖一引雛鷯子圖一蜂蝶茄菜圖一桃花戲貓圖一鷄冠草蟲圖一雛雀圖一萱草百合圖一折枝花圖一竹石戲貓圖二藥苖戲貓圖二子母貓圖二子母戲貓圖一羣貓圖一貓竹圖一夭桃圖一兒貓圖一周滉不知何許人也善畫水石花竹禽鳥頗工其妙作逺江近渚竹溪蓼㟁四時風物之變攬圖便如與水雲鷗鷺相追逐葢工畫花竹者往往依帶欄楯務為華麗之勝而滉獨取水邊沙外故出於畫史輩一等也今御府所藏十有二荷花鸂鶒圖一秋荷鸂鶒圖二蓼岸鷺鷥圖一芙蓉雜禽圖一水石雙禽圖一水石鷺鷥圖二水鷺圖一秋塘圖一秋景竹石圖一鸂鶒圖一胡擢不知何許人也博學能詩氣韻超邁飄飄然有方外之志嘗謂其弟曰吾詩思若在三峽之間聞猿聲時其髙情逸興如此一遇難狀之景則寄之於畫乃作草木禽鳥亦詩人感物之作也今御府所藏六木瓜錦棠圖一折枝花圖一冩生折枝花圖一單葉月季花圖一雜花圖一桃花圖一梅行思不知何許人也能畫人物牛馬最工於鷄以此知名世號曰梅家鷄為鬭鷄尤精其赴敵之狀昻然而來竦然而待磔毛怒癭莫不如生至於飲啄閒暇雌雄相將衆雛散漫呼食助呌態度有餘曲盡赤幘之妙冝其得譽焉鷄者庖厨之物初不足貴昔人謂畫犬馬為難工以其日夕近人唯鷄亦如此故作鬭鷄不無意也行思唐末人接五代家居江南為南唐李氏翰林待詔品目甚髙今御府所藏四十有一牡丹鷄圖一蜀葵子母鷄圖三萱草鷄圖二鷄圖十三引雛鷄圖五子母鷄圖三野雞圖一籠鷄圖六負雛鷄圖一鬭鷄圖六郭乾暉北海營丘人世呼為郭將軍善畫草木鳥獸田野荒寒之景鍾隱者亦一時名流變姓名執弟子禮師事久之方授以筆法乾暉常於郊居畜其禽鳥毎澄思寂慮玩心其間偶得意即命筆格律老勁曲盡物性之妙今御府所藏一百有四藂竹柘鷂圖二柘條鵲鷂圖一老木禽鷂圖二古木鷹鵲圖一竹石伯勞圖二鷂搦伯勞圖一藂棘伯勞圖二柘竹雜禽圖一柘竹鷂子圖一柘竹野鵲圖二柘竹噪鵲圖一柘條鵪鷂圖三柘條鷂子圖一柘林鵲鷂圖四柘條鶉鷂圖一鶻鷂圖一梨花鷂禽圖一蘆棘鶉鷂圖一架上鷂子圖十六野鷄鵪鶉圖一枯枿鷄鷹圖四竹木鷄鷹圖二冩生鵪鶉圖一古木鷓鴣圖四俊禽犇兎圖二蒼鷹捕貍圖二鵲鷂圖四古木鷂子圖一鷙禽圖一鷄鷹圖六棘兎圖二棘鶉圖一棘蘆圖一秋兎圖一棘雉圖三噪禽圖一鶉鷂圖八鷓鷂圖六蒼鷹圖一鵪鶉圖一鷄圖一鷹圖一野雞圖一鷂子圖一貓圖一鶻圖一野鴨圖一郭乾祐青州人兄乾暉有畫名乾祐善工花鳥名雖不顯如其兄然所學同門亦相上下耳其漸染所及自然近之耶如畫鷹隼使人見之則有擊摶之意然後為工故杜子美想像其拏攫則曰何當擊凡鳥毛血灑平蕪是畫之精絶能興起人意如此豈不較其善否哉至俊爽風生非筆端之造化何可以言傳也又能畫貓雖非專門亦有足采今御府所藏四野鶻圖一秋棘俊禽圖二顧蜂貓圖一宣和畫譜卷十五
