body:
  text: 宣和畫譜卷十三畜獸敘乾象天天行健故為馬坤象地地任重而順故為牛馬與牛者畜獸也而乾坤之大取之以為象若夫所以任重致逺者則復見取於易之隨於是畫史所以状馬牛而得名者為多至虎豹鹿豕獐兔則非馴習之者也畫者因取其原野荒寒跳梁犇逸不就羈􅎗之状以寄筆間豪邁之氣而已若乃犬羊貓貍又其近人之物最為難工花間竹外舞䄄綉幄得其不為搖尾乞憐之態故工至於此者世難得其人粤自晉迄于本朝馬則晉有史道碩唐有曹霸韓幹之流牛則唐有戴嵩與其弟戴嶧五代有厲歸真本朝有朱義輩犬則唐有趙博文五代有張及之本朝有宗室令松羊則五代有羅塞翁虎則唐有李漸本朝有趙邈齪貓則五代有李靄之本朝有王凝何尊師凡畜獸自晉唐五代本朝得二十有七人其詳具諸譜姑以尤者槩舉焉而包鼎之虎裴文睍之牛非無時名也氣俗而野使包鼎之視李漸裴文睍之望戴嵩豈不縮手於袖間耶故非譜之所宜取畜獸一晉史道碩唐漢王元昌江都王緒韋無忝曹霸裴寛韓幹韋鑒韋偃趙博文戴嵩戴嶧李漸李仲和張符史道碩不知何許人兄弟四人皆以善畫得名而道碩尤工人馬及鵝等初與王微竝師荀朂衛協技能上下二人優劣未判而謝赫謂王得其意史傳其似若是則微之所得者神道碩之所冩者形耳意與神超出乎丹青之表形與似未離乎筆墨蹊徑宜用此辨之今御府所藏三三馬圖一八駿圖一牛圖一漢王元昌髙祖第七子少博學善畫李嗣真謂元昌曰天人之姿博綜伎藝頗得風韻自然超舉有畫鞍馬鷹鶻傳于時雖閻立徳立本不得以季孟其間畫馬尤工非胸中有千里駸駸欲度驊騮前者豈能得之心而應之手耶今御府所藏三羸馬圖一獵騎圖二江都王緒唐霍王元軌之子太宗姪也能書畫最長於鞍馬以此得名官至金州刺史嘗謂士人多喜畫馬者以馬之取譬必在人材駑驥遲疾隱顯遇否一切如士之遊世不特此也詩人亦多以託興焉是以畫馬者可以倒指而數杜子美嘗觀曹霸畫馬而有詩曰國初已來畫鞍馬神妙獨數江都王則緒為一時之所重其可知歟今御府所藏三冩拳毛騧圖一人馬圖一呈馬圖一韋無忝京兆人與其弟無縱亦以畫稱無忝在明皇朝以畫馬及異獸擅名時外國有以師子來獻者無忝一見落筆酷似其真百獸皆望而辟易明皇嘗游獵一發中两豝於元武北門當時命無忝傳冩之遂為一時英妙之極且百獸之性與形相表裏而有雄毅而駿者亦有馴擾而良者故其足距毛鬛有所不同怒張妥帖亦從之而辨他人未必知此而獨無忝得之當時稱無忝畫四足之獸者無不臻妙豈虚言哉無忝官至左武衛大將軍今御府所藏九習馬圖一散馬圖一牧笛歸牛圖一山石戲貓圖一葵花戲貓圖一戲貓圖一勝遊圖一寧王醉歸圖一傾心圖一曹霸髦之後髦以畫稱於魏霸在開元中已得名天寶末毎詔冩御馬及功臣像官至左武衛大將軍杜子美丹青引以謂丹青不知老將至富貴於我如浮雲者謂霸也子美真知畫者退之嘗謂苟可以寓其智巧使機應於心不挫於氣則神完而守固其論似是夫外慕徙業者皆不造其堂不嚌其胾信矣葢霸暮年飄泊於干戈之際而卒不徙業此子美所謂富貴於我如浮雲者見乎此矣今御府所藏十有四逸驥圖二玉花騘圖一下槽馬圖二内廏調馬圖一老驥圖二九馬圖三牧馬圖一人馬圖一羸馬圖一裴寛絳州聞喜人季父漼有聞于時寛粗以文詞進多從辟舉所至皆有能穪明皇朝為范陽節度使兼採訪使頗受眷知唐史有傳不言寛能畫惟云騎射彈碁投壺特妙以此推之能畫可知大抵唐人多能書畫特著不著耳由是所畫傳於世者不多故為傳記譜録不載今御府所藏一小馬圖韓幹長安人王維一見其畫遂推奨之官止左武衛大將軍天寶初明皇召幹入為供奉時陳閎乃以畫馬榮遇一時上令師之幹不奉詔他日問幹幹曰臣自有師今陛下内廏馬皆臣之師也明皇於是益竒之杜子美丹青引云弟子韓幹早入室謂幹師曹霸也然子美何從以知之且古之畫馬者有周穆王八駿圖閻立本畫馬似模展鄭多見筋骨皆擅一時之名開元後天下無事外域名馬重譯累至内廏遂有飛黄照夜浮雲五方之乘幹之所師者葢進乎此所謂幹唯畫肉不畫骨者正以脱落展鄭之外自成一家之妙也忽一夕有人朱衣𤣥冠扣幹門者稱我鬼使也聞君善圖良馬欲賜一疋幹立畫焚之他日有送百縑來致謝而卒莫知其所謂鬼使者也建中初有人牽一馬訪醫者毛色骨相醫所未嘗見忽值幹幹驚曰真是吾家之所畫馬遂摩挲久之怪其筆意㝠㑹如此俄頃若蹶因損前足幹異之於是歸矣米芾畫史載嘉祐中有使江南者渡采石牛渚磯風大作不可渡於是禱中元水府祠是夕夢神告留馬當相濟既寤遂獻所藏幹馬已而風止乃渡至今典廟中米芾乃以玉樓成必李賀記竊比諸此誠哉是言葢才難也久矣不唯世間少天上亦少今御府所藏五十有二明皇觀馬圖一文皇龍馬圖一寧王調馬圖一八駿圖一奚官習馬圖四六馬圖一明皇試馬圖一五陵游俠圖一三馬圖一呈馬圖五五王出遊圖一内廏御馬圖三騎從圖一散驥圖三按鷹圖一寫三花御馬圖一圉人調馬圖一調馬圖三習馬圖二遊騎圖二遊俠人馬圖二李白封官圖二老驥圖一騎習人馬圖一玉花白馬圖一下槽馬圖四内廏圖一鑿馬圖一明皇射鹿圖二戰馬圖二韋鑒長安人善畫龍馬弟鑾工山水松石鑾之子偃亦畫馬松石名于時鑒實鼻祖且行天者莫如龍行地者莫如馬而鑒獨以龍馬得名豈非升降自如脱略羈控挾風雲犇逸之氣與夫躡景追電一秣千里得於心術之妙者足以知之所傳於世者不多今御府所藏三七賢圖二呈馬圖一韋偃父鑾善畫山水松石時名雖已籍籍而未免墮於古拙之習偃雖家學而筆力遒健風格髙舉煙霞風雲之變與夫輪囷離竒之状過父逺甚然世唯知偃善畫馬葢杜子美嘗有題偃畫馬歌所謂戲拈禿筆掃驊騮倐見騏驎出東壁者是也然不止畫馬而亦能工山水松石人物皆極精妙豈非世之所知特以子美之詩傳耶乃如黄四娘家花公孫大娘舞劍器此皆因之以得名者也今御府所藏二十有七牧放人馬圖一三驥圖一三馬圖一莫江五馬圖一牧馬圖九散馬圖三牧牛圖一沙牛圖一牧放羣驢圖一早行圖二讀碑圖二松石圖三松下髙僧圖一趙博文尚書左丞相趙涓之子世業儒喜丹青而於士女兎犬為尤工然士女犬兎皆目前近習易於形似而一時如王朏周昉皆有盛名于世博文遂能相後先則是必有得之於筆外而不止於世俗區區形似之習也今御府所藏一兎犬圖戴嵩不知何許人也初韓滉晉公鎮浙右時命嵩為巡官師滉畫皆不及獨於牛能窮盡野性乃過滉逺甚至於田家川原皆臻其妙然自是廊廟間安得此物宜滉於此風斯在下矣世之所傳畫牛者嵩為獨步其弟嶧亦以畫牛得名今御府所藏三十有八春陂牧牛圖一春景牧牛圖一牧牛圖十渡水牛圖一歸牛圖二飲水牛圖二出水牛圖二乳牛圖七戲牛圖一犇牛圖三鬭牛圖二犢牛圖一逸牛圖一水牛圖二白牛圖一渡水牧牛圖一戴嶧嵩之弟嵩以畫牛名髙一時葢用志不分乃凝於神苟致精于一者未有不進乎妙也如津人之操舟梓慶之削鐻皆所得于此於是嵩之畫牛亦致精于一時也然嶧學嵩遂能接武其後然喜作犇逸之状未免有所制畜其亦使觀者知所戒耶今御府所藏五松石牧牛圖一平坡乳牛圖一逸牛圖一鬬牛圖一犇牛圖一李漸不知何許人也官任忻州刺史善畫番馬人物至於牧放川原尤盡其妙筆迹氣調當時號為無儔子仲和能繼其蓺而筆力有所不及今御府所藏七川原牧馬圖二三馬圖一逸驥圖一牧馬圖二虎鬬牛圖一李仲和忻州刺史漸之子善畫番馬人物有父之遺風但筆力有所不逮也而相國令狐綯奕代為相家有小畫人馬幛是尤得意者憲宗嘗取置於禁中今御府所藏一小馬圖張符不知何許人也善畫牛頗工筆法有得於韓滉亦韓之𣲖也畫放牛圖獨取其村原風煙荒落之趣兒童横吹藉草之状其一簑一笠殆將人牛相忘自非妙造其理有進於技者何以得之於筆端耶今御府所藏五渡水牛圖一牧牛圖三水牛圖一宣和畫譜卷十三
