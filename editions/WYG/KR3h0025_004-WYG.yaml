  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0025_WYG_004-1a, image: WYG0813/WYG0813-0088a.png}
body:
  text: 宣和畫譜巻四道釋四宋孫夢卿孫知㣲句龍爽陸文通王齊翰顔徳謙侯翌武洞清韓虬楊棐武宗元徐知常李得柔孫夢卿字輔之東平人也工畫道釋學呉生而未能少變其後傳移呉本大得妙處至數丈人物本施寛濶者縮移狹隘則不過數寸悉不失其形似如以鑑取物見大小逺近耳覽者神之號稱孫脱壁又云孫呉生以此可見其精絶但施於卷軸者殊少葢塔廟歲久不能皆存也今御府所藏三太上像一葛仙翁像一松石問禪圖一孫知微字太古眉陽人也世本田家天機頴悟善畫初非學而能清淨寡慾飄飄然真神仙中人不茹婦人所饌食有密以驗之者皆不可逃所知喜畫道釋用筆放逸不蹈襲前人筆墨畦畛嘗於成都夀寧院壁圖九曜落墨已乃令童仁益輩設色侍從中有持水晶缾者因増以蓮花知㣲既見謂缾所以鎮天下之水吾得之道經今増以花失之逺矣故知知微之妙豈俗畫所能到也蜀人尤加禮之得畫則珍藏十襲知㣲多客寓寺觀精黄老瞿曇之學故畫道釋益工而蜀中寺觀尤多筆跡焉今御府所藏三十有七天蓬像二天地水三官像六九曜像三填星像一亢星像一火星像一十一曜像一歳星像一五星像一星官像二伏犧像一長夀仙像一葛仙翁像一寫孫先生像一維摩像一文殊降靈圖一智公真一過海天王圖一行道天王圖一遊行天王圖一羅漢像一衲衣僧一掃象圖一戰沙虎圖一虎鬬牛圖一牛虎圖一寫李八百妹産黄庭經像一寫彭祖女禮北斗像一句龍爽蜀人敦厚慎重不妄語言好丹青喜為古衣冠多作質野不媚之狀觀之如鼎彛間見三代以前篆畫也便覺近習為凡陋而使人有還淳反朴之意好畫故事人物世多傳其本今御府所藏一紫府仙山圖陸文通江南人畫山水道釋樓臺得名于時山水學董元巨然作羣峰雪霽圖覽之使人有登髙作賦之思畫道釋尤工作㑹仙圖皆出乎風塵物表飄飄然有凌雲之意是其筆端不凡者今御府所藏十有四神仙圖四仙山故實圖四㑹仙圖二羣峯雪霽圖四王齊翰金陵人事江南偽主李煜為翰林待詔畫道釋人物多思致好作山林丘壑隱巖幽卜無一㸃朝市風埃氣開寳未煜銜璧請命步卒李貴者入佛寺中得齊翰畫羅漢十六軸為商賈劉元嗣髙價售之載入京師質於僧寺後元嗣償其所貸願贖以歸而僧以過期拒之元嗣訟于官府時太宗尹京督索其畫一見大加賞嘆遂留畫厚賜而釋之閲十六日太宗即位後名應運羅漢今御府所藏一百十有九傳法太上圖一三教重屏圖一太陽像一太隂像一金星像一水星像一火星像一土星像一羅㬋像一計都像一北斗星君像一元辰像一長生朝元圖一寫南斗星像六㑹仙圖三仙山圖一佛像一因地佛圖一佛㑹圖一釋迦佛像二藥師佛像一大悲像二觀音菩薩像一勢至菩薩像一自在觀音像一寳陁羅觀音像一巖居觀音圖一慈氏菩薩像一白衣觀音像一須菩提像二十六羅漢像十六十六羅漢像十色山羅漢圖二羅漢像二玩蓮羅漢像二巖居羅漢像一賔頭盧像一玩泉羅漢像一髙僧圖一智公像一花巖髙僧像一巖居僧一髙士圖二藥王像二髙賢圖二逸士圖一重屏圖一古賢圖五圍碁圖一琴㑹圖一琴釣圖二垂綸圖一水閣圖一髙閒圖一靜釣圖一龍女圖一海岸圖二秀峯圖一陸羽煎茶圖一陵陽子明圖一支許閒曠圖一林壑五賢圖一林亭髙㑹圖一海岸琪木圖一江山隱居圖一金碧潭圖一設色山水圖一林汀遥岑圖一林泉十六羅漢圖四楚襄王夢神女圖一顔徳謙建康人也善畫人物多喜寫道像此外雜工動植論者謂王維不能過雖疑其與之太甚然在江南時偽唐李氏亦云前有愷之後有徳謙雖不及王顧亦居常品之上矣其最著者有蕭翼取蘭亭横軸風格特異可證前説但流落未見今御府所藏二十有一太上像一太上度闗圖一太上圖一太上採芝像一四子太上像一採芝圖一仙跡圖二十二溪女圖三洞庭靈姻圖二渡水牧牛圖二牧牛圖二乳牛圖一竹穿魚圖一野鵲圖一蟬蝶圖一侯翌字子沖安定人善畫端拱雍熈之際聲名藉甚學呉道元作道釋落墨清駛行筆勁峻峭拔而秀絢麗而雅亦畫家之絶藝也始年十三師郭巡官郭忘其名越四年所學過郭逺甚慮掩郭名徙寓秦川往往秦川僧舍畫壁尚有存者今御府所藏十有六行化太上像一天蓬像一九曜像一釋迦像一維摩文殊像一地藏菩薩像一長夀王菩薩像一問病維摩圖一智公傳真像一獻花菩薩像一淨名居士像一天王像一鬼子母像一漢殿論功圖一避暑士女圖一賦詩士女圖一武洞清長沙人也工畫人物最長於天神道釋等像布置落墨廣狹大小横斜曲直莫不合度而坐作進退向背俛仰皆有思致尤得人物名分尊嚴之體獲譽於一時至有市􅆵人以刋石著洞清姓名而求售者然其它畫則未聞傳於世者亦少獨十一曜具在今御府所藏二十有一太陽像二太隂像二金星像二木星像一水星像二火星像一土星像二羅㬋像一計都像一水仙像一智積菩薩像一侍香金童像一散花玉女像一藥王像一詩女對吟圖二韓虬一作求陜人也與李祝同學呉道元後聲譽並馳人以韓李稱尤長於道釋嘗在陜郊龍興寺作畫壁其骨相非世間形色葢深得於道元者也道元之於道釋世謂絶筆學者稍窺其藩籬則便為名流況虬專門之學宜其進於妙也今御府所藏十有三寫太隂像一水星像一星官像一觀音像一慈氏菩薩像一行道菩薩像二獻花菩薩像二獻香菩薩像二天王圖一東華司命晉陽真人像一楊棐京師人也客游江浙後居淮楚善畫釋典學呉生能作大像嘗於泗濵普照佛刹為二神率踰三丈質幹偉然凛凛可畏又作鍾馗亦工按鍾馗近時畫者雖多考其初或云明皇病瘧夢鍾馗舞於前以遣瘧癘其後傳寫形似於世世始有鍾馗然臨時更革態度大同而小異唯丹青家緣飾之如何耳又説嘗得六朝古碣於墟墓間上有鍾馗字似非始於開元也卒無考據今御府所藏二立像觀音一鍾馗氏圖一文臣武宗元字總之河南白波人官至虞曹外郎家世業儒而宗元特喜丹青之學尤長於道釋筆法備曹呉之妙父道與故相王隨為布衣之舊隨見宗元竒之因妻外甥女以隨􅄻補太廟齋郎嘗於西京上清宫畫三十六天帝其間赤明和陽天帝潛寫太宗御容以宋火徳王故以赤明配焉真宗祀汾隂還道由洛陽幸上清宫忽見御容驚曰此真先帝也遽命焚香再拜歎其精妙竚立久之張士遜有詩云曽此焚香動聖容葢謂是也祥符初營玉清昭應宫召募天下名流圖殿廡壁衆逾三千幸有中其選者才百許人時宗元為之冠故名譽益重輩流莫不歛衽今御府所藏十有五天尊像一天帝釋像一朝元仙仗圖一北帝像一真武像一火星像一土星像一天王圖一觀音菩薩像一渡海天王像一李得一衝雪過魯陵岡圖四道士徐知常字子中建陽人也能詩善屬文凡道儒典教與夫制作無不該曉脱略時輩蕭然老成有士君子之風方闡道教首預選掄挍讎琅函玉笈之書無不精確居閒則鼓琴瀹茗以自娯真方外之士畫神仙事蹟明其本末位置有序仙風道骨飄飄凌雲葢善命意者也舊嘗有痼疾遇異人得修煉之術却藥謝醫以至引年白髮紅顔真有所得今為沖虚大夫蘂珠殿侍晨今御府所藏一寫神仙事蹟一道士李得柔字勝之本河東晉人後徙居西洛得柔祖宗固嘗守漢州日有道士尹可元者犯法當死因緩之以免可元頗妙丹青臨羽化日自念云願生李族為男子以報厚徳是夕得柔母夢一黄冠來扣門既寤果生子今得柔是也得柔幼喜讀書工詩文至於丹青之技不學而能益騐其夙世之餘習焉寫貌甚工落筆有生意寫神仙故實嵩岳寺唐呉道元畫壁内四真人像其眉目風矩見之使人遂欲仙去設色非畫工比所施朱鉛多以土石為之故世俗之所不能知也方國家闡道之初讎挍瓊文蘂芨得柔首被其選議論品藻莫不中理今為紫虚大夫凝神殿挍籍今御府所藏二十有六大茅仙君像一二茅仙君像一三茅仙君像一鍾離權真人像一南華真人像一韋善俊真人像一吕巖仙君像一蘇仙君像一欒仙君像一陶仙君像一封仙君像一冦仙君像一張仙君像一譚仙君像一孫思邈真人像一王子喬真人像一朱桃椎真人像一浮丘公像一劉根真人像一天師像一太上浩劫圖一沖虚至徳真人像一寫呉道元真人像四宣和畫譜卷四
