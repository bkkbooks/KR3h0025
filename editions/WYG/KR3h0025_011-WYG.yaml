body:
  text: 宣和畫譜卷十一山水二宋董元李成范寛許道寧陳用志翟院㴱髙克明郭熙孫可元趙幹屈鼎陸瑾王士元燕肅董元一作源江南人也善畫多作山石水龍然龍雖無以考按其形似之是否其降陞自如出蟄離洞戲珠吟月而自有喜怒變態之狀使人可以遐想葢常人所以不識者止以想像命意得於𡨕漠不可考之中大抵元所畫山水下筆雄偉有嶄絶峥嶸之勢重巒絶壁使人觀而壯之故於龍亦然又作鍾馗氏尤見思致然畫家止以著色山水譽之謂景物富麗宛然有李思訓風格今考元所畫信然葢當時著色山水未多能傚思訓者亦少也故特以此得名于時至其出自胸臆冩山水江湖風雨溪谷峰巒晦明林霏煙雲與夫千岩萬壑重汀絶岸使鑒者得之真若寓目於其處也而足以助騷客詞人之吟思則有不可形容者今御府所藏七十有八夏山圖二江山髙隱圖二設色春山圖二羣峰霽雪圖一夏景窠石圖二夏山牧牛圖一林峰圖三夏山早行圖二秋山圖一江山漁艇圖一山麓漁舟圖一江山盪槳圖一萬木竒峰圖一著色山圖二窠石人物圖一水墨竹禽圖三晴峰圖一山居圖三山彴圖一松峰圖三長夀真人像一寫孫真人像一江堤晚景圖一重溪煙靄圖一冬晴逺岫圖二雪浦待渡圖二密雪漁歸圖一寒林重汀圖一寒林鍾馗圖二雪陂鍾馗圖二寒江窠石圖一寒林圖一松檟平逺圖一水石吟龍圖一風雨出蟄龍圖二山洞龍圖一戲龍圖二昇龍圖一跨龍圖一跨牛圖一飲水牧牛圖一鍾馗氏一巖中羅漢像一牧牛圖一瀟湘圖一漁舟圖一漁父圖一海岸圖一採菱圖二寒塘宿鴈圖三夏景山口待渡圖一水墨竹石栖禽圖二孔子見虞丘子圖二李成字咸熙其先唐之宗室五季艱難之際流寓於四方避地北海遂為營丘人父祖以儒學吏事聞於時家世中衰至成猶能以儒道自業善屬文氣調不凡而磊落有大志因才命不偶遂放意於詩酒之間又寓興于畫精妙􅀄非求善唯以自娯於其間耳故所畫山林藪澤平逺險易縈帶曲折飛流危棧斷橋絶澗水石風雨晦明煙雲雪霧之状一皆吐其胸中而冩之筆下如孟郊之鳴於詩張顛之狂於草無適而非此也筆力因是大進于時凡稱山水者必以成為古今第一至不名而曰李營丘焉然雖畫家素喜譏評號為善褒貶者無不斂衽以推之嘗有顯人孫氏知成善畫得名故貽書招之成得書且憤且歎曰自古四民不相雜處吾本儒生雖游心藝事然適意而已奈何使人羈致入戚里賔館研吮丹粉而與畫史冗人同列乎此戴逵之所以碎琴也卻其使不應孫忿之隂以賄厚賂營丘之在仕相知者冀其宛轉以術取之也不踰時而果得數圖以歸未幾成隨郡計赴春官較藝而孫氏卑辭厚禮復招之既不獲已至孫館成廼見前之所畫張於謁舍中成作色振衣而去其後王公貴戚皆馳書致幣懇請者不絶於道而成漫不省也晚年好遊江湖間終於淮陽逆旅子覺以經術知名踐歴館閣孫宥嘗為天章閣待制尹京故出金帛以購成之所畫甚多悉歸而藏之自成歿後名益著其畫益難得故學成者皆摹倣成所畫峰巒泉石至於刻畫圖記名字等庶幾亂真可以欺世然不到處終為識者辨之第名之不可揜而使人慕之如是信公議所同焉或云又兼善畫龍水亦竒絶也但所長在於山水之間故不稱云今御府所藏一百五十有九重巒春曉圖煙嵐春曉圖二夏山圖二夏景晴嵐圖二夏雲出谷圖四秋山圖三秋山静釣圖一冬晴行旅圖二秋嶺遙山圖二山鎖秋風圖二冬景遙山圖二密雲待渡圖二江山密雪圖三林石雪景圖三羣山雪霽圖三雪麓早行圖一雪溪圖二雪峰圖一愛景晴嵐圖三愛景寒林圖三寒林圖八寒林獨玩圖一竒石寒林圖二巨石寒林圖四嵐煙晚晴圖三煙嵐曉景圖七晴嵐曉景圖八嵐光清曉圖二曉嵐平逺圖二曉景雙峰圖二闊渚晴峰圖二曉嵐圖一晴嵐圖二晴巒圖二晴巒平逺圖三晴巒蕭寺圖二晴峰霽靄圖二晴江列岫圖二横峰曉霽圖三峻峰茂林圖一喬木蕭寺圖一長山平逺圖二古木遙岑圖四霧披遙山圖三山隂磨溪圖二髙山圖三平逺圖一雙峰圖三山腰樓觀圖三讀碑窠石圖二煙峰行旅圖二逺浦遙岑圖一煙波漁艇圖一江山漁父圖一亭泉松石圖一秀峰圖一平逺窠石圖一起蟄圖一大寒林圖四小寒林圖二山谷晴嵐圖二江臯羣峰圖三老筆層峰圖二羣峰灌木圖二春山早行圖三春雲出岫圖二范寛一名中正字中立華原人也風儀峭古進止疎野性嗜酒落魄不拘世故常往來於京洛喜畫山水始學李成既悟乃歎曰前人之法未嘗不近取諸物吾與其師於人者未若師諸物也吾與其師於物者未若師諸心於是捨其舊習卜居於終南太華岩隈林麓之間而覽其雲煙慘淡風月隂霽難状之景黙與神遇一寄于筆端之間則千巖萬壑恍然如行山隂道中雖盛暑中凜凜然使人急欲挾纊也故天下皆稱寛善與山傳神宜其與關李竝馳方駕也蔡卞嘗題其畫云關中人謂性緩為寛中立不以名著以俚語行故世傳范寛山水今御府所藏五十有八四聖搜山圖一春山圖二春山平逺圖三春山老筆圖二夏山圖十夏峰圖三夏山煙靄圖三秋山圖四秋景山水圖二煙嵐秋曉圖二冬景山水圖二雪景寒林圖一雪山圖二雪峰圖二寒林圖十二山隂蕭寺圖二海山圖一崇山圖三煉丹圖一許道寧長安人善畫山林泉石甚工初市藥都門時時戲拈筆而作寒林平逺之圖以聚觀者方時聲譽已著而筆法葢得於李成晩遂脱去舊學行筆簡易風度益著而張士遜一見賞詠久之因贈以歌其略云李成謝世范寛死唯有長安許道寧時以為榮今御府所藏一百三十有八茅亭賞雪圖一春山曉渡圖二春龍出蟄圖二江山捕魚圖一春雲出谷圖一山林春煙圖一三敎野渡圖一夏山圖七煙溪夏景圖一風雨驚牛圖一秋山晴靄圖二秋江喚渡圖一秋山詩意圖二秋山晚渡圖一秋山圖六秋江閒釣圖一秋江早行圖一嵐鎖秋峰圖三雪霽行舟圖三雪峰僧舎圖一雪滿羣峰圖三雪滿危峰圖三羣峰密雪圖三羣山密雪圖一雪江漁釣圖二雪山樓觀圖一寒林圖十三大寒林圖三小寒林圖五寒雲戴雪圖一愛景晴巒圖三晴峰漁浦圖一晴嵐曉峰圖二晴峰晚景圖三晴巒圖三晴峰圖三雲出山腰圖三煙鎖山腰圖三晴峰漁釣圖一羣峰秀嶺圖三羣峰雙澗圖二林樾遙岑圖一江山積雪圖一窠石戲龍圖二山路早行圖一霜秋晴巒圖一江山歸鴈圖三行觀華嶽圖一曉挂輕帆圖一層巒漁浦圖一雲山圖一林石圖二窠石圖六雙松圖二捕魚圖一牧牛圖一臨㴱圖一履薄圖一夏雲欲雨圖一山觀蕭寺圖一夏山風雨圖四溪山風雨圖一春嵐曉靄圖一春山行旅圖一冩李成夏峰平逺圖二陳用志潁川郾城人居小窰因而時人皆呼為小窰陳初為圖畫院祗候已而告歸於家在鄉里中工畫道釋人馬山林等雖詳悉精微但疎放全少而拘制頗嚴故求之於規矩之外無飄逸處也大抵所學不能恢廓耳今御府所藏一秋山圖翟院㴱北海人工畫山水而學李成與成同郡也院㴱年少時為本郡伶人一日郡守宴㑹方在庭執樂忽游目若有所寓頓失􅈜節樂工舉其過而劾之守詰其故院㴱具以其情對曰性本善畫操撾之次忽見浮雲在空宛若竒峰絶壁真可以為畫範目不两視因失􅈜節守歎而釋之此與賈島吟詩騎驢衝京尹何異古人謂用志不分乃凝於神院㴱近之矣院㴱摹傚李成畫則可以亂真至自為多不能創意於成之外亦有所未至爾使擴而充之不已其可量也耶今御府所藏一冩李成澄江平逺圖髙克明絳州人端愿謙厚不事矜持喜游佳山水間搜竒訪古窮幽探絶終日忘歸心期得處即歸燕坐静室沈屏思慮幾與造化者游於是落筆則胸中丘壑盡在目前祥符中以蓺進入圖畫院試之便殿圖畫壁遷待詔守少府監主簿賜紫克明亦善工道釋人馬花鳥鬼神樓觀山水等皆造髙妙也時人有以勢利求者未必荅朋友間有願得者即欣然與之疏財好義畫流輩中未易得也今御府所藏十春波吟龍圖二夏山飛􅓬圖二窠石野渡圖二煙嵐窠石圖二村學圖二郭熙河陽溫縣人為御畫院蓺學善山水寒林得名于時初以巧贍致工既久又益精㴱稍稍取李成之法布置愈造妙處然後多所自得至攄發胸臆則於髙堂素壁放手作長松巨木回溪斷崖岩岫巉絶峰巒秀起雲煙變滅䁆靄之間千態萬状論者謂熙獨步一時雖年老落筆益壮如隨其年貌焉熙後著山水畫論言逺近淺㴱風雨明晦四時朝暮之所不同則有春山淡一作􅝰冶而如􅀏夏山蒼翠而如滳秋山明浄而如籹冬山慘淡而如睡之説至於溪谷橋彴漁艇釣竿人物樓觀等莫不分布使得其所言皆有序可為畫式文多不載至其所謂大山堂堂為衆山之主長松亭亭為衆木之表則不特畫矣葢進乎道歟熙雖以畫自業然能教其子思以儒學起家今為中奉大夫管勾成都府蘭湟秦鳳等州茶事兼提舉陜西等買馬監牧公事亦􅅧於論畫但不能以此自名今御府所藏三十子猷訪戴圖二竒石寒林圖二詩意山水圖二古木遙山圖二巧石雙松圖二江臯圖一遙峰圖一睛巒圖一煙雨圖一雲岩圖一秀松圖一春山圖一㠋嶺圖一􅓬布圖一幽谷圖一濺撲圖一平逺圖一寒峰圖一斷崖圖一秀巒圖一古木圖一茂峰圖一逺山圖一山觀圖一谿谷圖一孫可元不知何許人好畫呉越間山水筆力雖不至豪放而氣韻髙古喜圖髙士幽人巖居漁隱之趣嘗作春雲出岫觀其命意則知其無心於物聊游戲筆墨以玩世者所以非陶潛綺皓之流不見諸筆下今御府所藏十有二陶潜歸去來圖一滕王閣圖一商山四皓圖二山麓漁歌圖一髙隱圖一春雲山岫圖一江山蕭散圖一山水圖二山觀圖一牧牛圖一趙幹江南人善畫山林泉石事偽主李煜為畫院學生故所畫皆江南風景多作樓觀舟船水村漁市花竹散為景趣雖在朝市風埃間一見便如江上令人褰裳欲涉而問舟浦漵間也今御府所藏九春林歸牧圖一夏山風雨圖四夏日玩泉圖一煙靄秋涉圖一冬晴漁浦圖一江行初雪圖一屈鼎開封府人善畫山水仁宗朝為圖畫院祗候學燕貴作山林四時風物之變態與夫煙霞慘舒泉石凌礫之状頗有思致雖未能極其精妙視等輩故已駸駸度越矣今畫譜姑取之葢使學之者有進於是而已今御府所藏三夏景圖三陸瑾江南人善畫江山風物落筆瀟灑殊無塵埃作四時圖繪春則山隂曲水夏則茂林泉石秋則風雨溪壑冬則雪橋野店鋪張㸃綴歴歴可觀至於捕魚運石水閣僧舎布置物像無不精確可以追蹤名手但傳于世不多耳今御府所藏二十有二山隂髙㑹圖一溪山僧舎圖一水閣閒棊圖一夏山圖四雪橋圖一運石圖一磨溪圖二溪山風雨圖三漁家風景圖三捕魚圖二乘龍圖一仙山圖二王士元仁夀之子也止於郡推官襟韻蕭爽喜作丹青遂能兼有諸家之妙人物師周昉山水師關仝屋木師郭忠恕凡所下筆者無一筆無來處故皆精微山水中多以樓閣臺榭院宇橋徑務為人居處牕牖間景趣耳乏􅅧山大谷煙霞之氣議者以此病之然求其風韻則髙於闗仝其筆力則老於商訓今御府所藏一山閣圖文臣燕肅字穆之其先本燕薊人也後徙居曹南祖𦵏於陽翟今為陽翟人文學治行縉紳推之其胸次瀟灑毎寄心於繪事尤喜畫山水寒林與王維相上下獨不為設色舊傳太常與玉堂屏等皆肅之真蹟而肅嘗寓於景寧坊所居亦有其畫今皆湮沒焉獨睢潁洛佛寺尚存遺墨肅心匠甚巧不特善畫山水凡創物足以驚世絶人且如徐州之蓮花漏是也又嘗有造鼓既畢而忘易鐶者無因可以使釘腳拳於鼓之腹遂造肅請術肅乃呼鍜者命作一大鎖簧入之衆皆服其智由是知肅畫之妙皆類於此也而王安石於人物慎許可獨題肅之所畫瀟湘山水圖詩云燕公侍書燕王府王求一筆終不與奏論讞死誤當赦全活至今何可數燕王葢元儼也為元儼僚屬不肯下之有以見肅之操守焉至其抗章論獻天下疑案奏讞自肅始也全活至今何啻億萬計故安石又曰仁人義士埋黄土只有粉墨歸囊楮則歎息於斯不亦宜乎歴官至龍圖閣直學士以尚書禮部侍郎致仕子孫既顯贈太師天下止稱燕公今御府所藏三十有七春岫漁歌圖一春山圖四夏溪圖二秋山逺浦圖一冬晴釣艇圖二雪滿羣山圖三寒林圖一大寒林圖二小寒林圖二履冰圖一江山蕭寺圖二古岸遙山圖三送寒衣女圖一状牛頭山望圖一渡水牛圖一雙松圖二松石圖一冩李成履薄圖二雪浦人歸圖四寒雀圖一宣和畫譜卷十一
