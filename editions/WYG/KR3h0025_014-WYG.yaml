  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0025_WYG_014-1a, image: WYG0813/WYG0813-0152a.png}
body:
  text: 宣和畫譜卷十四畜獸二五代羅塞翁張及之厲歸真李靄之宋令松趙邈齪朱義朱瑩甄慧王凝祁序何尊師羅塞翁乃錢塘令隱之子為呉中從事喜丹青善畫羊精妙卓絶世罕見其筆隱以詩名于時而塞翁獨寓意於丹青亦詞人墨客之所致思今御府所藏二牧牛圖海物圖張及之京兆人畫犬馬花鳥頗工作犬得其敦厖無搖尾乞憐之状世或傳其騎射圖擎蒼牽黄挽强馳驅筆力豪逸極妙然所得特犬馬之習方五代干戈之際風聲氣俗葢有自而然今御府所藏一寫犬圖道士厲歸真莫知其鄉里善畫牛虎兼工竹雀鷙禽雖號道士而無道家服餙唯衣布􅂁徜徉闤闠視酒壚旗亭如家而歸焉人或問其出處乃張口茹拳而不言所以人莫之測也一日朱梁太祖詔而問曰卿有何道理歸真對曰臣衣單愛酒以酒禦寒用畫償酒此外無能梁祖然之推是語以究其所得必非常人此與除睡人間總不知之意何異真寓之於畫耳南昌信果觀中有聖像甚工毎苦雀鴿糞穢而歸真為畫一鷂於壁間自此遂絶亦頗竒怪要其至非術則幾神矣今御府所藏二十有八雲龍圖一乳虎圖一牧牛圖七渡水牧牛圖二渡水牛圖一牧放顧影牛圖一江堤牧放圖一荀竹乳兎圖一柏林水牛圖一乳牛圖五貓竹圖一宿禽圖一鵲竹圖二筍竹圖一蜂蝶鵲竹圖一蔓𤓰圖一李靄之華隂人善畫山水泉石尤喜畫貓雅為羅紹威所厚建一亭為靄之援毫之所名曰金波時以號靄之為金波處士妙得幽人逸士林泉之思致故一寄於畫則無復朝市車塵馬足肩磨轂擊之狀真胸中自有丘壑者也畫貓尤工葢世之畫貓者必在於花下而靄之獨畫在藥苖間豈非幽人逸士之所寓果不為紛華盛麗之所移耶今御府所藏十有八藥苖戲貓圖一醉貓圖三藥苖雛貓圖一子母戲貓圖三戲貓圖六小貓圖一子母貓圖一蠆貓圖一貓圖一宗室令松字永年與其兄令穰俱以丹青之譽竝馳工畫花竹無俗韻以水墨作花果為難工而令松獨於此不凡然巧作朽蠧太多論者或病之而畫犬尤得名于時昔人謂畫虎不成反類於狗今令松故直作狗豈無意乎官至右武衛將軍隰州團練使贈徐州觀察使追封彭城侯今御府所藏四瑞蕉獅犬圖一花竹獅犬圖一秋菊相屬圖二趙邈齪亡其名朴野不事修飾故人以邈齪穪不知何許人也善畫虎不惟得其形似而氣韻俱妙葢氣全而失形似則雖有生意而徃往有反類狗之状形似備而乏氣韻則雖曰近是奄奄特為九泉下物耳夫善形似而氣韻俱妙能使近是而有生意者唯邈齪一人而已今人多穪包鼎為上游者亦猶井蛙澤鯢何足以語滄溟之渺瀰也今御府所藏八叢竹虎圖三出山虎圖一戰沙虎圖一伏虎圖一馴虎圖一虎圖一朱義江南人與朱瑩其族屬也皆以畫牛得名作斜陽芳草牧笛孤吹村落荒閒之景而無市朝犇逐之趣雖望戴嵩為不及而亦後來名家今御府所藏六牧牛圖三横笛牧牛圖一飲水牛圖一乳牛圖一朱瑩江南人與朱義同族亦善畫牛馬得名尤工人物作牧牛圖極臻其妙然飲水齕草葢牛之真性非筆端􅅧造物理而徒為形似則人人得以專門矣獨瑩與義殆若知之者今御府所藏五牧牛圖四牛圖一甄慧睢陽人善畫佛像帝釋脱落世間形相具天人之威儀故以此得名于時亦工畫牛馬而留意甚精至於穿絡真性固已失之矣而鞭繩之所制畜亦有見於警策者也畫雖末技而意之所在故有進於妙者今御府所藏一牧童卧牛圖一王凝不知何許人也嘗為畫院待詔工畫花竹翎毛下筆有法頗得生意又工為鸚鵡及師貓等非山林草野之所能不唯責形象之似亦兼取其富貴態度自是一格苟不能焉終不到也今御府所藏一繡墪獅貓圖祁序一作嶼江南人善工畫花竹禽鳥又工畫牛人或謂有戴嵩遺風至於畫貓近世亦罕有其比貓與牛者皆人之所常見毎難為工昔人有畫鬭牛者衆穪其精獨有一田夫在傍乃指其瑕既而問之乃曰我見鬭牛多擫尾今掲其尾非也畫者惘然因服其不到序亦有鬭牛甚竒今御府所藏四十有四倒影牛圖一渡水乳牛圖二四皓奕碁圖三夾竹桃花圖二長江漁樂圖一瀟湘逢故人圖二冩生鷄冠花圖一牧牛圖二十二乳牛圖三鬭牛圖二水牛圖一牧羊圖一詩客圖二虎圖二何尊師不知何許人也龍徳中居衡岳不顯名氏常往來於蒼梧五嶺僅百餘年人嘗見之顏貌不改或問其氏族年夀但云何何或問其郷里亦云何何時人因此遂號曰何尊師不見他技但喜戲弄筆墨工作花石尤以畫貓專門為時所穪凡貓寝覺行坐聚戲散走伺䑕捕禽澤吻磨牙無不曲盡貓之態度推其獨步不為過也嘗謂貓似虎獨有耳大眼黄不相同焉惜乎尊師不充之以為虎但止工於貓似非方外之所習亦意其寓此以遊戲耳今御府所藏三十有四戎葵太湖石圖一葵石戲貓圖六山石戲貓圖一葵花戲貓圖二葵石羣貓圖二子母戲貓圖一莧菜戲貓圖一子母貓圖一薄荷醉貓圖一羣貓圖一戲貓圖五貓圖一醉貓圖十石竹花戲貓圖一宣和畫譜卷十四
