body:
  text: 宣和畫譜卷九龍魚敘論易之乾龍有所謂在田在淵在天以言其變化超忽不見制畜以比夫利見大人詩之魚藻有所謂頒其首莘其尾依其蒲以言其游深泳廣相忘江湖以比夫難致之賢者曰龍曰魚作易刪詩前聖所不廢則畫雖小道故有可觀其魚龍之作亦詩易之相為表裏者也龍雖形容所不及然葉公好之而真龍乃至則龍之為畫其傳久矣呉曹弗興嘗於溪中見赤龍出水上寫以獻孫皓世以為神後失其傳至五代才得傳古其放逸處未必古人所能到本朝董羽遂以龍水得名于時實近代之絶筆也魚雖耳目之所玩宜工者為多而畫者多作庖中几上物乏所以為乘風破浪之勢此未免絓乎世議也五代袁㠖専以魚蠏馳譽本朝士人劉寀亦以此知名然後知後之來者世未乏也悉以時代繫之自五代至本朝得八人凡水族之近類者因附其末若徐白徐臯等輩亦以畫魚得名于時然所畫無涵泳噞喁之態使人但埀涎耳不復有臨淵之羨宜不得傳之譜也龍魚水族附五代袁㠖僧傳古宋克夐叔儺董羽楊暉宋永錫劉寀袁㠖河南登封人為侍衞親軍善畫魚窮其變態得噞喁游泳之狀非若世俗所畫作庖中物特使饞獠生涎耳今御府所藏十有九遊魚圖六戲魚圖一羣魚圖一竹穿魚圖一魚蟹圖一魚蝦圖二寫生鱸魚圖一筍竹圖三竹石圖一蟹圖一僧傳古四明人天資頴悟畫龍獨進乎妙建隆間名重一時垂老筆力益壯簡易髙古非世俗之畫所能到也然龍非世目所及若易為工者而有三停九似蜿蜒升降之狀至于湖海風濤之勢故得名於此者罕有其人傳古獨專是習宜為名流也皇建院有所畫屏風當時號為絶筆今御府所藏三十有一衮霧戲波龍圖二穿石戲浪龍圖二吟霧戲水龍圖二踴霧出波龍圖二吟霧躍波龍圖一爬山躍霧龍圖二踴霧戲水龍圖一穿石出波龍圖二穿山弄濤龍圖二出水戲珠龍圖一戲雲雙龍圖一戲水龍圖四出洞龍圖一翫珠龍圖二出水龍圖一祥龍圖一吟龍圖一戲龍圖一戲水龍圖一坐龍圖一宗室克夐佳公子也戲弄筆墨不為富貴所埋沒畫遊魚盡浮沈之態然惜其不見湖海洪濤巨湍之勢為毫端壯觀之助所得止京洛池塘間之趣耳官止右武衞大將軍漳州團練使累贈保康軍節度使追封髙密侯今御府所藏一逰魚圖一宗室叔儺善畫多得意於禽魚毎下筆皆黙合詩人句法或鋪張圖繪間景物雖少而意常多使覽者可以因之而遐想昔王安石有絶句云汀洲雪漫水溶溶睡鴨殘蘆晻靄中歸去北人多憶此毎家圖畫有屏風叔儺所畫率合於此等詩亦髙致也官至濮州防禦使累贈少師今御府所藏十有七鮮鱗戲荇圖二荷花遊魚圖二羣蠡圖二遊魚圖四桃溪珍禽圖一秋江宿禽圖一戲荇圖一弄萍游魚圖一蓮塘灌水圖一雪汀驚鴈圖一穿荇羣魚圖一董羽字仲翔毗陵人善畫魚龍海水不為汀濘沮洳之陋濡沫涸轍之游喜作禹門砥柱乘長風破萬里浪驚雷怒濤與之為出沒盡魚龍超忽覆却之狀其筆端所得豈惟壯觀而已耶事偽主李煜為待詔後隨煜歸京師即命為圖畫院蓺學今金陵清涼寺有李煜八分題名蕭逺草書羽畫海水為三絶羽語吃時以董啞子稱方太宗嘗令畫端拱樓壁觀者畏懾因以杇鏝羽亦終不偶頃畫水於玉堂北壁其洶湧瀾飜望之若臨煙江絶島間雖咫尺汗漫莫知其涯涘也宋白為時聞人一見擊節稱賞因賦以詩其警句謂回眸已覺三山近滿壁潛驚五月寒則羽之得名豈虚矣哉今御府所藏十有四騰雲出波龍圖一踴霧戲水龍圖二出山子母龍圖一龍圖二戰沙龍圖二翫珠龍圖三出水龍圖一穿山龍圖一江叟吹笛圖一楊暉江南人善畫魚得其揚鬐鼓鬛之態蘋蘩荇藻映帶清淺浮沈鼓躍曲盡其性今人畫魚者多拘鱗甲之數或貫柳或在陸奄奄無生意惟暉則不拘世習吹柳絮􅃞桃花於魚得計時往往見之筆下覽之者如在濠梁間然未免畫家者流所指摘也今御府所藏一遊魚圖一宋永錫蜀人也畫花竹禽鳥魚蟹學梁廣善傳色大抵兩蜀丹青之學尤盛而工人物道釋者為多自刁光處士入蜀而始以其學授黄荃而花竹禽鳥學者因以専門然終不能望荃之兼能也永錫亦後來之秀遂能以名家今御府所藏四寫生荷花圖二魚蟹圖二文臣劉寀字宏道少時流寓都下狂逸不事事放意詩酒間亦能為長短句與貴游少年相從無虚日善畫魚深得戲廣浮深相忘於江湖之意葢畫魚者鬐鬛鱗刺分明則非水中魚矣安得有涵泳自然之態若在水中則無由顯露寀之作魚有得於此他人作魚皆出水之鱗葢不足貴也由是專門頗為士人所推譽漂泊不得志曳裾侯門一夕大雪擁九衢闔户不出平時過從謂寀舊雪來今雪不來後數日友生候之意其僵仆矣因大叫出戶謂友生曰我阻雪不死與若曹罷酒不出許時擁褐壊屋下無所為得封事一通可獻天子或有遇合自此遂吐胸中霓矣同輩皆笑之俄而上所陳事神考嘉歎而官之後厯任州縣今為朝奉郎今御府所藏三十戲藻羣魚圖一羣鮊戲茭圖一泳萍戲魚圖一倒竹戲魚圖一羣魚戲荇圖一羣鯉逐蝦圖一戲荇鯚魚圖一游魚圖九魚藻圖五魚蟹圖一戲荇魚圖一戲水遊魚圖一龜魚圖一在藻魚圖二牡丹遊魚圖一落花遊魚圖一宣和畫譜卷九
