body:
  text: 宣和畫譜卷十二山水三宋宋道宋廸王榖范坦黄齊李公年李時雍王詵童貫劉瑗梁揆羅存馮覲巨然日本國文臣宋道字公逹洛陽人以進士擢第為郎善畫山水閒淡簡逺取重于時但乘興即寓意非求售也其畫故傳于世者絶少弟廸亦能畫今御府所藏一松竹圖文臣宋廸字復古洛陽人道之弟以進士擢第為郎性嗜畫好作山水或因覽物得意或因冩物創意而運思髙妙如騷人墨客登髙臨賦當時推重往往不名以字顯故謂之宋復古又多喜畫松而枯槎老枿或髙或偃或孤或雙以至于千株萬株森森然殊可駭也聲譽大過於兄道今御府所藏三十有一晴巒漁樂圖二煙嵐漁浦圖一扁舟輕泛圖一古岸遙岑圖一羣峯逺浦圖一對岸古松圖二闊浦逺山圖一闊浪遙岑圖一瀟湘秋晩圖一江山平逺圖一長江晩靄圖一遙山松岸圖二雙松列岫圖二老松對南山圖一崇山茂林圖二逺浦征帆圖二秋山圖一遙山圖二逺山圖二雪山圖一八景圖一萬松圖一小寒林圖一文臣王榖字正叔潁川郾城人有吏才於儒學之外又寓興丹青多取今昔人詩詞中意趣冩而為圖繪故鋪張布置率皆瀟灑居郾城邑之南城有小亭下臨㶏水榜曰㶏景亭南通淮蔡北望箕潁川原明秀甚類江鄉景物呉處厚曾有詩云亂鶯啼處栁飛花拍拍春流漲曉沙正是江南梅子熟年年離恨寄天涯榖常遊其上得助甚多時發其妙於筆端間耳榖頃佐京尹後又為大理寺卿今御府所藏三洞庭曉照圖一雪晴漁浦圖一雪江旅思圖一文臣范坦字伯履洛陽人以䕃補入官長於吏事所至皆以明辨稱善丹青作山水其筆法學闗仝李成至於摹冩花鳥則幾近之也雖寓意於此甚久然人罕知之葢其不出以求知耳在洛中閒居之日為多得游蓺繪事下筆益老徤世之論畫者謂學人規矩多失之拘或柔弱無骨鯁坦既老健則拘與弱皆非所病焉今以承議郎徽猷閣待制致仕今御府所藏六太上渡闗圖一冩李成江山梵刹圖四冩徐崇嗣杏花對果圖一文臣黄齊字思賢建陽人游太學有時名挍蓺毎在髙等後擢進士第調官都下僦居必擇閒曠逺市聲處官曹暮歸闔户不出多寓興丹青遂作風煙欲雨圖非隂非霽如梅天霧曉霏微晻靄之状殊有㴱思使他人想像於微茫之間若隱若顯不能窮也此殆與詩人騷客命意相表裏齊歴官至大司成今任朝散大夫兵部侍郎致仕今御府所藏四風煙欲雨圖一晴江捕魚圖一山荘自樂圖一雪滿羣峰圖一文臣李公年不知何許人善畫山水運筆立意風格不下於前輩冩四時之圖繪春為桃源夏為欲雨秋為歸棹冬為松雪而所布置者甚有山水雲煙餘思至於冩朝暮景趣作長江日出疎林晩照真若物象出沒於空曠有無之間正合騷人詩客之賦詠若山明望松雪寒日出霧遲之類也公年嘗為江浙提㸃刑獄公事今御府所藏十有七桃溪春山圖一夏溪欲雨圖一秋江歸棹圖一秋霜漁浦圖一松峯積雪圖一欲雨寒林圖一雲生列岫圖一逺煙平野圖一日出長江圖一疎林晩照圖一秋江静釣圖二江山漁釣圖二對岸古松圖二長江秋望圖一文臣李時雍字致堯成都人天章閣待制大臨之孫朝奉大夫隲之子也自大臨至時雍三世皆以書名于時時雍讀書刻意翰墨初從事舉子屢以行蓺中鄉里選終不第遂以祖䕃補入仕崇寧中以書名藉甚方建書學首擢為書學諭因獻頌遷博士喜作詩或寓意丹青間皆不凡作墨竹尤髙遂將與文同竝馳官至承議郎殿中丞今御府所藏一渭川晩晴圖駙馬都尉王詵字晉卿本太原人今為開封人㓜喜讀書長能屬文諸子百家無不貫穿視青紫可拾芥以取嘗袖其所為文謁見翰林學士鄭獬獬歎曰子所為文落筆有竒語異日必有成耳既長聲譽日益藉甚所從遊者皆一時之老師宿儒於是神考選尚秦國大長公主詵博雅該洽以至奕棊圖畫無不造妙冩煙江逺壑栁溪漁浦晴嵐絶澗寒林幽谷桃溪葦村皆詞人墨卿難状之景而詵落筆思致遂將到古人超軼處又精於書真行草𨽻得鐘鼎篆籀用筆意即其第乃為堂曰寶繪藏古今法書名畫常以古人所畫山水寘於几案屋壁間以為勝玩曰要如宗炳澄懐卧遊耳如詵者非胸中自有丘壑其能至此哉喜作詩嘗以詩進呈神考一見而為之穪賞至其奉秦國失歡以疾薨神考親筆責詵曰内則朋淫縱慾而失行外則狎邪罔上而不忠抑以見神考取捨人物示天下之至公不以好惡為己私也然詵卒能奉詔以自新雖牢落中獨以圖書自娯其風流蘊藉真有王謝家風氣若斯人之徒顧豈易得哉歴官至定州觀察使開國公駙馬都尉贈昭化軍節度使謚榮安今御府所藏三十有五幽谷春歸圖一晴嵐曉景圖一煙嵐晴曉圖三煙江疊嶂圖一松路入仙山圖一客帆挂瀛海圖一風雨松石圖一長江風雨圖一漁鄉曝網圖一栁溪漁浦圖一江山漁樂圖一江亭寓目圖一漁村小雪圖一江山平逺圖一房次律宿因圖一㑹稽三賢圖一連山絶澗圖一老松野岸圖一金碧潺湲圖一名山卧遊圖一秀峯逺壑圖二千里江山圖一屏山小景圖一冩李成寒林圖二子猷訪戴圖一山居圖二松石圖二長春圖一逺景圖一内臣童貫字道輔一作道通京師人性簡重寡言而御下寛厚有度量能容喜慍不形于色然能節制兵戎率有紀律父湜雅好藏畫一時名手如易元吉郭熙崔白崔慤輩往往資給于家以供其所需貫侍其父獨取其尤者有得于妙處胸次磅礴間發其祕或見筆墨在傍則㺯翰遊戲作山林泉石隨意㸃綴興盡則止人有收去者往往復取而壊之左右毎因其興來揮毫落墨之時或在􅅲紙背或於斷幅間乃亟藏之不復出皆以為珍玩也故因其少而尤貴之大抵命思瀟灑落筆簡易意足得之自然耳若宿習而非求合取悦也自古之用兵者如諸葛孔明亦能畫故八陣圖之形勢見于分布粲然可觀如馬援聚米為山川亦有畫意豈非方寸明於規畫不期乎能而能耶貫於此亦然貫䇿功湟鄯與夫西鄙拔城而俘馘夷醜體貌鎮重不嚴而威凡進􅅲賞罰初不見運動之迹故莫得以窺之貫獨寛惠慈厚人率歸心至號為著脚赦書葢言其所至推恕有恩惠以及物也其於出處勲庸自有正史詳載此得以略也今貫歴官任太傅山南東道節度使領樞密院事陜西河東等路宣撫使封涇國公今御府所藏四窠石四内臣劉瑗字伯玉京師人持身端慤初終無玷時人謂五十餘年在仕而喜怒不形于色為两朝從龍未嘗自矜父有方平日性喜書畫家藏萬卷牙籖玉軸率有次第自晉魏隋唐以來竒書名畫無所不有故能考覈真偽論辨古今推其人世次逺近各有攸當故世所言書畫者皆率心服之凡中外之人有得繪畫而莫知主名者必以求瑗辨之瑗雖未敢誰何然論之皆有所歸也瑗亦能放筆作雲林泉石頗復瀟灑昔桓譚以謂能誦千賦自可為之與此相類然適意而止所傳乃不多非若專門積累於歲月者也今瑗官至通侍大夫武勝軍一作清逺軍承宣使贈少師謚忠簡今御府所藏三臨李成小寒林圖一秋景平逺圖一秋雲欲雨圖一色山髙士圖一竹石小景圖一小景墨竹圖二墨竹圖一竹石圖一内臣梁揆字仲敘京師人以䕃補入仕自齠齔之時便喜刻雕及繪事矣及長因所閲甚多往往一見而便能似其宿習花竹人物凡可賦象者一一能之率取其名流髙古之畫各擇其一以資衆善冀兼備焉揆齒方壮若更加討論使就繩撿則有加而無已揆今官任左武大夫達州防禦使直睿思殿今御府所藏二春山霽靄圖一蓮溪漁父圖一内臣羅存字仲通開封人性喜畫作小筆雖身在京國而浩然有江湖之思致不為朝市風埃之所汩沒落筆則有煙濤雪浪扁舟翻舞咫尺天際坡岸髙下人騎出沒披圖便如登髙望逺悠然與魚鳥相往還此人後生若其學駸駸未已他日豈可量哉存官任武徳大夫文州團練使充殿中省尚食局奉御今御府所藏二秋江歸騎圖一雪霽歸舟圖一内臣馮覲字遇卿開封人少好丹青作江山四時隂晴旦暮煙雲縹緲之状至於林樾樓觀頗極精妙畫金風萬籟圖怳然如聞笙竽于木末其間思致㴱處殆與秋聲賦為之相參焉惜乎覲性習未寧但恐他日參差耳覲今任武翼大夫永㤗陵都監今御府所藏十有三雨餘春曉圖一江山春早圖一膏雨乍晴圖一薰風樓觀圖一清夏潺湲圖一霽煙長景圖一南山茂松圖一江山晩興圖一金風萬籟圖一霜霽凝煙圖一霜秋漁浦圖一江山密雪圖一雪霽羣山圖一僧巨然鍾陵人善畫山水㴱得佳趣遂知名于時毎下筆乃如文人才士就題賦詠詞源衮衮出於毫端比物連類激昻頓挫無所不有葢其胸中冨甚則落筆無窮也巨然山水於峯巒嶺竇之外下至林麓之間猶作卵石松柏疎筠蔓草之類相與映發而幽溪細路屈曲縈帶竹籬茅舎斷橋危棧真若山間景趣也人或謂其氣質柔弱不然昔嘗有論山水者乃曰儻能於幽處使可居於平處使可行天造地設處使可驚嶄絶戲嶮處使可畏此真善畫也今巨然雖瑣細意頗類此而曰柔弱者妄以是論評之耳又至於所作雨腳如有爽氣襲人信哉昔人有畫水挂於壁間猶曰波濤洶湧見之皆毫髪為立况於煙雲變化乎前蹤迹一出於已畫録稱之不為過矣今御府所藏一百三十有六夏景山居圖六夏日山林圖一夏雲欲雨圖一秋江晚渡圖二夏山圖三九夏松峯圖三秋山圖二秋江漁浦圖四溪山蘭若圖六溪山漁樂圖六溪山林藪圖二溪橋髙隱圖一重溪疊嶂圖四山溪水閣圖一江山逺興圖二江山静釣圖一江山晚景圖一江村捕魚圖一江山旅店圖一江山晚興圖一江山歸棹圖六江左醒心圖一江山平逺圖一江山行舟圖二松峯髙隱圖二煙浮逺岫圖六山林歸路圖一山林小筆圖一曉林野艇圖一茂林疊嶂圖一林汀逺渚圖一林石小景圖一煙闗小景圖一雲横秀嶺圖二雲嵐清曉圖三松路仙巖圖一松巖蕭寺圖一晴冬晻靄圖六嵐鎖羣峰圖四寒溪漁舎圖一小寒林圖二遙山漁浦圖二山隂蕭寺圖二遙山濶浦圖三松吟萬壑圖三萬壑松風圖二羣峯茂林圖二晥口山圖一山居圖一松巖山水圖二煙江晩渡圖一山水圖四層巒圖一秀峰圖三金山圖一鍾山圖一廬山圖一松嶺圖二柏泉圖一遙山圖一逺山圖一松峯圖三髙隱圖一歸牧圖一長江圖一窠石圖一日本國古倭奴國也自以近日所出故改之有畫不知姓名傳冩其國風物山水小景設色甚重多用金碧考其真未必有此第欲綵繪粲然以取觀美也然因以見殊方異域人物風俗又蠻陬夷貊非禮義之地而能留意繪事亦可尚也抑又見華夏之文明有以漸被豈復較其工拙耶舊有日本國官告傳至於中州比之海外他國已自不同冝其有此太平興國中日本僧與其徒五六人附商舶而至不通華語問其風土則書以對書以𨽻為法其言大率以中州為楷式其後再遣弟子奉表穪賀進金塵硯鹿毛筆倭畫屏風今御府所藏三海山風景圖一風俗圖二宣和畫譜卷十二
