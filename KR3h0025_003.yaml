body:
  text: 宣和畫譜卷三道釋三五代王商燕筠支仲元左禮朱繇李昇杜子瓌杜齯龜張元曹仲元陸晃貫休王商不知何許人也工畫道釋士女尤精外國人物與胡翼同時並為都尉趙嵓所厚嵓筆法髙妙方時謂一經品目即便為名流所以致嵓之厚者豈虚名哉商有職貢逰春士女等圖及佛像傳於世今御府所藏十有一老子度闗圖一職貢圖二貢奉圖五􅀢林風俗圖一􅀢林士女圖一􅀢林婦女圖一燕筠不知何許人也工畫天王筆法以周昉為師頗臻其妙然不見他畫獨天王傳於世豈非當五代兵戈之際事天王者為多亦時所尚乎至於輔世遺烈見於澶淵則天王功徳亦不誣矣宜為世所崇奉焉筠以名家亦可貴也今御府所藏二行道天王圖一天王圖一支仲元鳯翔人畫人物極有工隨其所宜見於動作態度多畫道家與神仙像意其亦物外人也又喜作碁圖非自能碁則無由知布列變易之勢至於松下林間對碁者莫不率有思致焉今御府所藏二十有一太上傳法圖一大上誡尹喜圖一太上度闗圖一三教像一五星圖一三仙圖一七賢圖二商山四皓四皓圍碁圖一圍碁圖一㑹碁圖一松下奕碁圖二勘書圖一堯民擊壤圖二林石碁㑹圖二碁㑹圖二左禮不知何許人也工寫道釋像與張南本同時故筆法近相類葢道釋雖非鬼神之狀為難知若近習而易工者然氣貌亦自殊體道家則仙風道骨要非世俗抗塵之狀釋氏則慈悲枯槁與世淡泊無貪生奔競之態非有得於心者詎能以筆端形容所及哉禮專以道釋為工其亦技進乎妙者也有二十四化圖十六羅漢三官十真人等像傳於世今御府所藏三天官圖一地官圖一水官圖一朱繇唐末長安人也工畫道釋妙得呉道𤣥筆法人未易優劣也雒中廣愛寺河中府金真觀皆有繇所畫壁工道釋未有不以道𤣥為法者然升堂入室世罕其人獨繇不唯妙造其極而時出新意千變萬態動人耳目國朝武宗元嘗在雒見其所畫壁云文殊隊中舊有善財童子予酷愛其筆法玩之月餘不忍去今遂失其童子所在信其畫亦神矣弟子趙裔亦知名一時今御府所藏八十有三元始天尊像一天地水三官像三金星像一木星像二水星像二火星像三土星像一天蓬像二南北斗星真像一釋迦佛像四無量夀佛像二藥師佛像二問疾維摩圖二五方如來像一佛像二兜率佛鋪圖一文殊菩薩像四降靈文殊像一普賢菩薩像三降靈普賢像一維摩像二觀世音菩薩像三行道菩薩像五大悲像二香花菩薩像一寳檀菩薩像一菩薩像二帝釋圖一金剛手菩薩像一西方圖一揭帝神像四䕶法神像六善神像七天王像二北門天王像二捧塔天王像一髙僧像一地獄變相一李昇唐末成都人也初得李思訓筆法而清麗過之一日得唐張璪山水一軸凝玩久之輒舍去後乃心師造化脱略舊習命意布景視前輩風斯在下猶韓幹視廏中萬馬曰真吾師也故能度越曹霸輩數等昇之於畫葢得之矣蜀人亦呼為小李將軍葢當時李昭道乃思訓子也思訓號大李將軍昭道號小李將軍今昇與昭道聲聞並馳故以名云昇筆意幽閑人有得其畫者往往誤稱王右丞者焉今御府所藏五十有二採芝太上像一太上度闗圖一六甲神像六葛洪移居圖一仙山圖一仙山故實圖一天王像一行道天王像二渡海天王像一呉王避暑圖一滕王閣宴㑹圖一滕王閣圖五姑蘇集㑹圖一避暑宫圖五江上避暑圖一故實人物圖二江山清樂圖一出峽圖一逺山圖一山水圖一象耳山大悲真相一十六羅漢像十六杜子瓌華隂人也精意道釋因畫圓光自謂得意非丹青家所及毎詫於流輩曰我作圓光時心游海上遐想日出扶桑滄滄涼涼其狀若此故脱略筆墨使妍淡無迹宜他人所不能到也論者以為信然子瓌研吮丹粉尤得其術故綵繪特異今御府所藏十有六毗盧遮那佛像一釋迦文佛像一彌勒佛像一大悲佛鋪圖一大悲像二大力明王像二五如來像一觀音像一白衣觀音像一文殊菩薩像一如意輪菩薩像一寳印菩薩像一寳檀像一杜齯龜其先秦人也避地居蜀事王衍為翰林待詔博學强識無不兼能至丹青之習妙出意外畫佛相人物尤工始師常粲後捨舊學自成一家故筆法凌轢輩流粲亦莫得接武也成都僧舍所畫壁名葢一時今御府所藏十有四天地水三官像三佛因地圖一釋迦佛像一大悲像二孔雀明王像一慈氏菩薩像一普賢菩薩像一淨名居士圖一托塔天王像一善神像二張元簡州金水石城山人善畫釋氏尤以羅漢得名世之畫羅漢者多取竒怪至貫休則脱略世間骨相竒怪益甚元所畫得其世態之相故天下知有金水張元羅漢也今御府所藏八十有八大阿羅漢三十二釋迦佛像一羅漢像五十五曹仲元建康豐城人江南李氏時為翰林待詔畫道釋鬼神初學呉道𤣥不成棄其法别作細密以自名家尤工傅彩遂有一種風格嘗於建業佛寺畫上下座壁凡八年不就李氏責其緩命周文矩較之文矩曰仲元繪上天本様非凡工所及故遲遲如此越明年乃成李氏特加恩撫焉杜甫詩謂十日一水五日一石能事不受相促迫信不誣也此與左思十年三賦何異故古之畫工率非俗士其模寫物象多與文人才士思致相合以其㝠搜相類耳當時江左言道釋者稱仲元為第一不為過焉今御府所藏四十有一九曜像一三官像三佛㑹圖三地藏圖一釋迦佛像二無量夀佛像一彌勒佛像二五十三佛像一五方如來像一觀音像十二白衣觀音像三慈氏菩薩像一文殊菩薩像二摩利支天菩薩像二如意輪菩薩像一玩蓮菩薩像一孔雀明王像一大悲像二普賢像一陸晃嘉禾人也善人物多畫道釋星辰神仙等而又喜為數稱者如三仙四暢五老六逸七賢與山隂㑹仙五王避暑之類是也或言晃尤工田家人物落筆便成殊不搆思古人所不到葢田父村家或依山林或處平陸豐年樂歳與牛羊雞犬熈熈然至於追逐婚姻鼓舞社下率有古風而多見其真非深得其情無由命意然擊壤鼓腹可寫太平之像古人謂禮失而求諸野時有取焉雖曰田舍亦能補風化耳今御府所藏五十有二玉皇大帝像一太上像一天官像一星官像一散聖圖一列曜圖二道釋像一孔聖像一四暢圖四五老圖一六逸圖一明王宴樂圖一按樂圖一烹茶圖一繡線圖一開元避暑圖三五王避暑圖三火龍烹茶圖一山隂㑹仙圖四神仙事迹圖一故實人物圖一春江漁樂圖二田戲人物圖一水仙圖三勘書圖一古木圖一三仙圍棊圖一葛仙翁飛錢出井圖二長生保命真君像一九天定命真君像一天曹益筭真君像一天曹掌禄真君像一天曹解厄真君像一九天司命真君像一九天度厄真君像一天曹賜福真君像一天曹掌筭真君像一僧貫休姓姜字徳隱婺州蘭溪人初以詩得名流布士大夫間後入兩川頗為偽蜀王衍待遇因賜紫衣號禪月大師又善書時人或比之懐素而書不甚傳雖曰能畫而畫亦不多間為本教像唯羅漢最著偽蜀主取其本納之宫中設香燈崇奉者踰月乃付翰苑大學士歐陽炯作歌以稱之然羅漢狀貌古野殊不類世間所傅豐頥慼額湥目大鼻或巨顙槁項黝然若夷䝤異類見者莫不駭矚自謂得之夢中疑其託是以神之殆立意絶俗耳而終能用此傳世太平興國初太宗詔求古畫偽蜀方歸朝乃獲羅漢今御府所藏三十維摩像一須菩提像一髙僧像一天竺髙僧像一羅漢像二十六宣和畫譜卷三
