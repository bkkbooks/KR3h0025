body:
  text: 宣和畫譜卷十九花鳥五宋王曉劉常劉永年吳元瑜賈祥樂士宣李正臣李仲宣王曉泗州人善畫鳴禽叢棘俊鷹等師郭乾暉雖若未至而就其擊摶飛揚之狀至為卑棲羣噪者之所警其亦雄俊已哉蓋傳于世者絶少矣今御府所藏一噪雀圖劉常金陵人善畫花竹極臻其妙名重江左家治園圃手植花竹日遊息其間每得意處輒索紙落筆遂與造物者為友染色不以丹鉛襯傅調勻深淺一染而就頃時米芾赴書學博士過金陵有以常所畫折枝桃花獻者於是芾置之於屏間坐卧其下夜索燭與對若相晤言賞歎者纍月以謂常之所學不減於趙昌之流今御府所藏四寫生杏花圖一桃花圖一木瓜花圖一六花圖一武臣劉永年字公錫章獻明肅皇后之姪孫其先本彭城人後徙於開封因以家焉永年生四歲會仁宗初總萬機録外氏子孫之未仕者於是以永年為內殿崇班出入兩宫仁宗使賦小詩有一柱會擎天之句帝乃驚異之又嘗誤投金盞於瑤津亭下戲顧左右曰孰能為我取之者永年一躍持之而出帝撫其頂曰劉氏千里駒也自爾待之甚異置內從中年十二始聽出外永年喜讀書通曉兵法勇力兼人嘗使遼會以職事致遼人怒夜以巨石塞驛門衆皆恐獨永年如無素以勇力聞乃取其巨石而擲棄之遼人以為神使遂還朝稱旨擢知涇州帝製詩以寵其行疑其鐡心石腸而雄豪邁往之氣不復作婉媚事乃能從事翰墨丹青之學濡毫揮灑蓋皆出於人意之表作鳥獸蟲魚尤工又至所畫道釋人物得貫休之竒逸而用筆非畫家纎毫細管遇得意處雖堊帚可用此畫史所不能及也嘗任侍衛步軍馬軍親軍殿前都虞候步軍副都指揮使雍州觀察使崇信軍節度使諡壯恪今御府所藏三十有六花鴨圖四家鵝圖三寫生家鵝圖一雙鵝圖五鷹兔圖一角鷹圖一鷹圖一蘆雁圖四寫生龜圖一水墨雙鴿圖一羣雞圖一卧烏圖二松鶻圖一水墨獾圖一栁穿魚圖一牧放驢圖一秋兔圖二墨竹圖二寫木星像一夀鹿圖一水墨茄菜圖一武臣吳元瑜字公器京師人初為吳王府直省官換右班殿直善畫師崔白能變世俗之氣所謂院體者而素為院體之人亦因元瑜革去故態稍稍放筆墨以出胸臆畫手之盛追蹤前輩蓋元瑜之力也故其畫特出衆工之上自成一家以此專門傳於世者甚多而求元瑜之筆者踵相躡也吳王遣元瑜親詣泰州傳徐神翁像有進士李芬作詩送之曰吳將軍元瑜丹青妙當世吳王命扁舟下海陵貌徐神翁像以歸故為詩敘其事以贈云秦皇寤寐毛盈語鋭意長生欲輕舉徐福藥就仙骨成雲海茫茫但延佇東西日月秋復春海變桑田更幾人忽思重看舊寰宇驂鸞直下江淮濵布衣野叟不耕藝自向琳宫操拔篲祕語親書悟世人一坐忽驚三十歲淮南奉道聞真迹命使扁舟訪消息畫手從來獨擅場一見仙風心自得歸來目斷蒼煙垠三尺生綃醉墨翻軸上神翁不解語倣佛白鶴乘孤雲海陵相望一千里嗟我塵勞未云已授書圯上會有期誠心願取黃公履其為一時所重如此後出為光州兵馬都監再調官輦轂下而求畫者愈不已元瑜漸老不事事亦自重其能因取他畫或弟子所模寫冒以印章繆為已筆以塞其責人自能辨之未幾而卒官至武功大夫合州團練使今御府所藏一百八十有九寫生牡丹圖一桃花黃鸝圖一緋桃卧烏圖一杏花野雞圖三杏花錦鳩圖一黃鶯餅桃圖一柏梢餅桃圖一杏花鸂鶒圖二杏花會禽圖二梨花鷺鷥圖二梨花孔雀圖五梨花鳩子圖三梨花黃鶯圖一松梢杏花圖一林檎杜鵑圖二金林檎碧雞圖一金林檎山鷓圖二海棠山鷓圖一海棠鳩子圖一海棠遊春鶯圖一海棠黃鶯圖二李花鸚鵡圖二碧桃山青圖二瑞香四勝兒圖二栁塘鸂鶒圖二春禽圖一木瓜花孔雀圖一木瓜雙禽圖一春江圖一葵花鷺鷥圖四夏岸圖一榴花碧雞圖二葵花白鷴圖四榮荷圖一榴花金翅兒圖一秋塘圖一白蓮圖二秋汀落雁圖二秋汀圖一秋汀野鴨圖二鵝汀秋晚圖二榠楂孔雀圖一芙蓉鴛鴦圖二風煙鷺鷥圖二平沙落雁圖一敗葉家鵝圖二風竹山鷓圖二雪竹鷯子圖一冬林圖一雪禽圖二雪江行旅圖一雪竹山青圖二雪蘆寒雁圖一雪雁圖二雪竹繡纓圖二藂竹雪禽圖四梅竹雪雀圖二竹梢梅花圖一雪竹雙禽圖三梅花山鷓圖三雪梅寒雁圖二江梅落雁圖二梅竹雙禽圖一雪鴨圖二梅花山青圖一山茶鷯子圖一雪梅山鷓圖二叉頭紅荔子圖一四季角金眉圖一孔雀圖二鶉鷂圖二落雁圖二水竹鸂鶒圖二紫芥戲貓圖一子母戲貓圖一水墨雪竹圖一鄜梨伯勞圖一虎皮紅荔子圖一流英圖二方紅荔子圖一墨竹圖六玳瑁紅荔子圖一粉紅荔子圖一寫生香桂圖一朱柿荔子圖一瓊花孔雀圖一柘竹紫燕圖一牛心荔子圖一蚶殼荔子圖一真珠荔子圖一丁香荔子圖一十一曜像十四天尊像一真武像一四方七宿星像四釋迦佛像一觀音經相一水月觀音像一觀音菩薩像一陶潛夏居圖一寫徐神翁真一煙寺晚鏡圖一瑤池圖三駉牧圖一水閣間碁圖一六馬圖一考牧圖一玩珠龍圖一杏花鳩子圖一番族圖二林檎花遊春鶯圖一梔子烏頭白頰圖一內臣賈祥字存中開封人少好工巧至於丹青之習頗極其妙當時畫家者流一遭品題便為名士時寶和殿新成其屏當繪設色寫龍水於其上顧畫史雖措手皆不當祥意上命祥筆之而神間意定縱筆為龍初不經思已而夭矯空碧體制增新望之使人毛髮竦立人皆服其妙作竹石草木鳥獸樓觀皆工時人得之者遂為珍玩至於雕鏤塑造靡所不能官至通侍大夫保康軍節度觀察留後知入內內侍省事贈少師諡忠良今御府所藏十有七宣和玉芝圖一寫生玉芝圖一梵閣圖一湖石紫竹圖三寫生竒石圖七寒林鴝鵒圖一小筆一册戲貓圖一寫生水墨家蔬圖一內臣樂士宣字德臣世為祥符人早年放浪不束於繩撿中年蒞職東太乙宫遂與錬師方外之士往往從遊留心沖漠遂覺行年所過為非以是一意於詩書之習方其未知書則喜玩丹青獨愛金陵艾宣之畫既胸中厭書史而丹青亦自造疏淡乃悟宣之拘窘於是捨其故步而筆法遂將凌轢於前輩畫花鳥尤得生意視艾宣蓋奄奄九泉下人矣故當時有出藍之譽晚年尤工水墨縑綃數幅唯作水蓼三五枝鸂鶒一雙浮沉於滄浪之間殆與杜甫詩意相參士大夫見之莫不賞詠士宣未嘗輕以示人凡所畫或以求之再三而幸得者皆藏之以為好屢以畫上進實為北省絶藝也士宣天資明敏晚以邊功超擢熙寧中神考以謂夏童不恭乃肆天討嘗命李憲等以五路之兵進攻靈武期於一舉成捷嘗下詔曰如有敢議班師者以軍法從事至於師老儲乏主帥方議班師無敢啓言者獨士宣毅然白於帥府請自邊乘驛七晝夕達奏至於京師神考欣然從之其時士宣方為小行人之職而敢冒死犯顔以請者臣子之竒節也故知其胸中軒昻挺然不凡其見於丹青之習特餘事耳官至西京作坊使持節虔州諸軍事虔州刺史虔州管內觀察使致仕贈少保今御府所藏四十有一柏梢黃鸝圖一銀杏白頭翁圖一羣鳬戲水圖一秋岸蘆鵝圖一秋岸鸂鶒圖一柘竹戴勝圖一梅竹雪禽圖二牡丹鵓鴿圖二金林禽山鷓圖一秋塘雙禽圖二菊岸羣鳬圖一古木會禽圖一蓼岸鸂鶒圖一寫生鸂鶒圖三寫生葵花圖一秋塘圖三鶺鴒圖一練禽圖一雀竹圖二水墨秋塘圖二水墨竹禽圖一水墨松竹圖二水墨野鵲圖一水墨太平雀圖一水墨鸂鶒圖四水墨山青圖一水墨雜禽圖一墨竹圖一內臣李正臣字端彥喜工丹青寫花竹禽鳥頗有生意至於翔集羣啅各盡其態時作叢棘疏梅有水邊籬落幽絶之趣不作粗俗桃李雕欄曲檻以為浮艷之勝亦見其胸次所致思也官止文思使今御府所藏六柘竹雜禽圖一梅竹山禽圖一鵪鶉圖一寫雜禽圖二棘雀圖一內臣李仲宣字象賢始專於窠木後喜工畫鳥雀頗造其妙觀柘雀圖其顧盼向背一幹一禽皆極形似蓋當時畫工亦歎服之其所缺者風韻蕭散蓋亦有所未至焉然人間罕見其本者以其寓意於燕雀之微不求聞達以自娛爾官至內侍省供奉官今御府所藏三寒雀圖一柘雀湖石圖一柘條雀圖一宣和畫譜卷十九
