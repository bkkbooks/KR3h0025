body:
  text: 宣和畫譜卷二十墨竹敘論繪事之求形似捨丹青朱黃鉛粉則失之是豈知畫之貴乎有筆不在夫丹青朱黃鉛粉之工也故有以淡墨揮掃整整斜斜不專於形似而獨得於象外者往往不出於畫史而多出於詞人墨卿之所作蓋胸中所得固已吞雲夢之八九而文章翰墨形容所不逮故一寄於毫楮則拂雲而髙寒傲雪而玉立與夫招月吟風之狀雖執熱使人亟挾纊也至於布景致思不盈咫尺而萬里可論則又豈俗工所能到哉畫墨竹與夫小景自五代至本朝才得十二人而五代獨得李頗本朝魏端獻王頵士人文同輩故知不以著色而專求形似者世罕其人墨竹小景附五代李頗宋親王頵令穰令庇王氏李瑋劉夢松文同李時敏閻士安梁師閔僧夢休李頗一作坡南昌人善畫竹氣韻飄舉不求小巧而多於情任率落筆便有生意然所傳於世者不多蓋竹昔人以謂不可一日無而子猷見竹則造門不問誰氏袁粲遇竹輒留七賢六逸皆以竹隱詞人墨卿髙世之士所眷意焉頗不習他技獨有得於竹知其胸中故自超絶今御府所藏一叢竹圖親王皇叔端獻王頵英宗第四子也幼而秀嶷長而頴異忠孝友愛出於天性方居東宫時自熙寧至於元豐凡十上章疏乞居外第於是神宗以其同氣之情終不允許至元祐初固請期於必從而後已於是太皇太后哲宗兩宫重違其意乃允其請蓋忠孝友愛故非出於勉强也平居之時無所嗜好獨左右圖書與管城毛穎相周旋作篆籀飛白之書而大小字筆力雄俊戲作小筆花竹蔬果與夫難狀之景粲然目前以墨寫竹其茂梢徑節吟風㵼露拂雲篩月之態無不曲盡其妙復善蝦魚蒲藻古木江蘆有滄洲水雲之趣非畫工所得以窺其藩籬也今御府所藏七十籜筍榮竹圖二籜筍小景圖一帶根筍竹圖一徑節筍竹圖二折枝嫩梢圖一折枝秋梢圖一折枝古竹圖一榮竹圖一蒲竹圖二􅚠竹圖一寫生鴨腳圖二水墨叢竹圖四水墨榮竹圖二水墨蘆竹圖二水墨宿竹圖二水墨老竹圖一水墨紫薑圖一水墨筍竹圖二墨竹黃鸝圖二墨竹小景圖二墨竹圖三十墨竹春梢圖二折枝墨竹圖一四景墨竹圖一墨竹春梢凝露圖一墨竹孫枝蘸碧圖一墨竹挺節凌霜圖一宗室令穰字大年藝祖五世孫也令穰生長宫邸處冨貴綺紈間而能游心經史戲弄翰墨尤得意於丹青之妙喜藏晉宋以來法書名畫每一過目輒得其妙雖藝成而下得不愈於博奕狗馬者乎至於畫陂湖林樾煙雲鳬雁之趣荒遠閒暇亦自有得意處雅為流輩之所貴重然所寫特於京城外坡坂汀渚之景耳使周覽江浙荆湘崇山峻嶺江湖溪澗之勝麗以為筆端之助則亦不减晉宋流輩嘗因端午節進所畫扇哲宗嘗書其背云朕嘗觀之其筆甚妙因書國泰二字賜之一時以為榮官至崇信軍節度觀察留後贈開府儀同三司追封榮國公今御府所藏二十有四墨竹雙鵲圖二柘竹雙禽圖二四景山水圖四小景圖二風竹圖一溪山春色圖一夏溪行旅圖一秋塘羣鳬圖一寒灘密雪圖一江汀集雁圖一水墨鴝鵒圖二怪石筠柘圖二雪江圖一雪莊圖一遠山圖一訪戴圖一宗室令庇善畫墨竹凡落筆瀟灑可愛世之畫竹者甚多難得疏秀不求形似盡娟娟竒態者故橫斜曲直各分向背淺深露白以資竒特或作蟠屈露根風折雨壓雖援毫弄巧往往太拘所以格俗氣弱不到自然妙處唯士人則不然未必能工所謂形似但命意布致灑落疏枝秀葉初不在多下筆縱橫更無凝滯竹之佳思筆簡而意已足矣俗畫務為竒巧而意終不到愈精愈繁竒畫者務為疏放而意嘗有餘愈略愈精此正相背馳耳令庇當以文同為歸庶不入於俗格官見任衡州防禦使今御府所藏一墨竹圖親王端獻魏王頵婦魏越國夫人王氏自髙祖父中書令秦正懿王審琦以勳勞從藝祖定天下為功臣之家而未聞閨房之秀復能接武光輝者端慧淑慎有古曹大家之風則魏越國夫人其後焉蓋年十有六以令族淑德妻端獻王其所以柔順間靚不復事珠玉文繡之好而日以圖史自娛至取古之賢婦烈女可以為法者資以自繩作篆𨽻得漢晉以來用筆意為小詩有林下泉間風氣以淡墨寫竹整整斜斜曲盡其態見者疑其影落縑素之間也非胸次不凡何以臻此今御府所藏二寫生墨竹圖二駙馬都尉李瑋字公照其先本錢塘人後以章懿皇太后外家得緣戚里因以進至京師仁宗召見於便殿問其年曰十三質其學則占對雍容因賜坐與食瑋下拜謝而上舉止益可觀於是仁宗竒之顧左右引視中宫繼宣諭尚兖國公主瑋善作水墨畫時時寓興則寫興䦨輒棄去不欲人聞知以是傳于世者絶少士大夫亦不知瑋之能也平生喜吟詩才思敏妙又能章草飛白散𨽻皆為仁祖所知大抵作畫生于飛白故不事丹青而率意於水墨耳官至平海軍節度使撿挍太師贈開府儀同三司諡修恪今御府所藏二水墨蒹葭圖湖石圖劉夢松江南人善以水墨作花鳥於淺深之間分顔色輕重之態互相映發雖綵繪無以加也自成一種氣格耳又作䊸竹圖甚精緻蓋竹本以直為上修篁髙徑架雪凌霜始有取焉今夢松乃作䊸曲之竹不得其所矣或造物賦形不與之完或有所拘閡而不遂其性又或以所託非其地而致此皆物之不幸者將以著戒焉今御府所藏三雪鵲圖二䊸竹圖一文臣文同字與可梓潼永泰人善畫墨竹知名于時凡於翰墨之間託物寓興則見於水墨之戲頃守洋州於篔簹谷構亭其上為朝夕遊處之地故於畫竹愈工至於月落亭孤檀欒飄發之姿疑風可動不筍而成蓋亦進於妙者也或喜作古槎老枿淡墨一掃雖丹青家極毫㨋之妙者形容所不能及也蓋與可工於墨竹之畫非天資頴異而胸中有渭川千畝氣壓十萬丈夫何以至於此哉官至司封員外郎充祕閣挍理今御府所藏十有一水墨竹雀圖二墨竹圖四折枝墨竹圖一疏竹生青壁圖一著色竹圖一古木修筠圖二文臣李時敏字致道成都人時雍之弟作字與兄時雍相後先大字尤工每作文餘字初不費力又善弧矢凡箭發無不破的雖百發未見其出侯者而時敏有吏才妙於丹青蓋書畫者本出一體而科斗篆籀作而書畫乃分冝時敏兄弟皆以書畫名冠一時官止朝請郎今御府所藏一詩意圖閻士安陳國宛丘人家世業醫性喜作墨戲荆檟枳棘荒崖斷岸皆極精妙尤長于竹或作風偃雨霽煙薄景曛霜枝雪幹亭亭苒苒曲盡其態中書令諡武恭王德用好收花竹之畫士安作墨竹圖獻之德用一見歎美不已遂以為篋中之冠奏補國子四門助教後之學者往往取以為模楷焉今御府所藏二墨竹圖一折枝墨竹圖一武臣梁師閔一作士閔字循德京師人以資䕃補綴右曹父和嘗以詩書教師閔略通大意能詩什其後和因其好工詩書乃令學丹青下筆遂如素習長于花竹羽毛等物取法江南人精緻而不疏謹嚴而不放多就規矩繩墨故少瑕纇蓋出於所命而未出于胸次之所得出於規模未出于規模之所拘者也大抵拘者猶可以放至其放則不可拘矣蓋師閔之畫於此方興而未艾欲至於放焉今任左武大夫忠州刺史提㸃西京崇福宫今御府所藏二栁溪新霽圖一蘆汀密雪圖一僧夢休江南人喜延揖畫史之絶藝者得一佳筆必髙價售之學唐希雅作花竹禽烏煙雲風雪盡物之態蓋亦平生講評規模之有自今御府所藏二十有九風竹圖十四筍竹圖七叢竹圖六雪竹圖一雪竹雙禽圖一蔬果敘論灌園學圃昔人所請而早韭晚菘來禽青李皆入翰林子墨之美談是則蔬果宜有見於丹青也然蔬果於寫生最為難工論者以謂郊外之蔬易工於水濵之蔬而水濵之蔬又易工於園畦之蔬也蓋墜地之果易工於折枝之果而折枝之果又易工於林間之果也今以是求畫者之工拙信乎其知言也況夫蘋蘩之可羞含桃之可薦然則丹青者豈徒事朱鉛而取玩哉詩人多識草木蟲魚之性而畫者其所以豪奪造化思入妙微亦詩人之作也若草蟲者凡見諸詩人之比興故因附于此且自陳以來至本朝其名傳而畫存者才得六人焉陳有顧野王五代有唐垓輩本朝有郭元方釋居寧之流餘有畫之傳世者詳具于譜至於徐熙輩長于蟬蝶鑒裁者謂為熙善寫花然熙别門兼有所長故不復列于此如侯文慶僧守賢談宏等皆以草蟲果蓏名世文慶者亦以技進待詔然前有顧野王後有僧居寧故文慶守賢不得以季孟其間故此譜所以不載云蔬果藥品草蟲附陳顧野王五代唐垓丁謙宋郭元方李延之僧居寧顧野王字希馮吳郡人七歲讀五經九歲善屬文識天文地理無所不通尤長於畫在梁朝為中領軍後宣城王為揚州刺史野王與琅琊王褒竝為賓客野王善圖畫乃令野王畫古賢命王褒書贊時人稱為二絶畫草蟲尤工多識草木蟲魚之性詩人之事畫亦野王無聲詩也入陳官至黃門侍郎今御府所藏一草蟲圖唐垓不知何許人也善畫禽魚生菜世稱其工然魚蟲草木雖甚微也自非妙於萬物而為言發而見於形容者未易知此至有野禽生菜魚蝦海物等圖傳于世矣且畫魚蝦者不過汀渚池塘與夫庖中機上之物至海物則罕見其本焉若其瑰怪雄傑乘時射勢鼓風霆破萬里浪不至乎中流折角㸃額則畫亦雄矣垓之於海物者其有得於此焉今御府所藏一生菜圖丁謙晉陵人初工畫竹後兼善果實園蔬傅粉淺深率有生意蟲蠧殘蝕之狀具能模寫至使人捫之若有跡也嘗畫葱一本為江南李氏賞激親書丁謙二字於其上蓋欲别其非常畫耳其後冦凖藏之以為珍玩焉今御府所藏三寫生蓮藕圖一寫生葱圖二武臣郭元方字子正京師人善畫草蟲信手寓興俱有生態盡得蠉飛鳴躍之狀當時頗為士大夫所喜然率爾落筆疏略簡當乃為精絶或㸃綴求竒則欲益反損此正所謂外重內拙黃金注者也論者亦以此少之大抵造物之意初無心於整齊至于自形自色則各有攸當苟物物雕琢使之妍好則安得周而遍哉故刻楮雖工造一葉至於三年君子不取也豈非直欲漸近自然乎元方官至內殿承制今御府所藏三草蟲圖三武臣李延之善畫蟲魚草木得詩人之風雅寫生尤工不墮近時畫史之習狀於飛走必取其儷亦以賦物各遂其性之意官止左班殿直今御府所藏十有六寫生草蟲圖十寫生折枝花圖一金沙遊魚圖一雙鶴圖一雙獐圖一雙蟹圖一喓喓圖一僧居寧毗陵人喜飲酒酒酣則好為戲墨作草蟲筆力徑峻不專于形似每自題云居寧醉筆梅堯臣一見賞詠其超絶因贈以詩其略云草根有纎意醉墨得已熟於是居寧之名藉甚好事者得之遂為珍玩耳今御府所藏一草蟲圖一宣和畫譜卷二十
