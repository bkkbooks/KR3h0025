body:
  text: 宣和畫譜卷二道釋二唐吳道𤣥翟琰楊庭光盧楞伽趙德齊范瓊常粲孫位張南本辛澄張素卿陳若愚姚思元吳道𤣥字道子陽翟人也舊名道子少孤貧客游洛陽學書於張顛賀知章不成因工畫未冠深造妙處若悟之於性非積習所能致初為兖州瑕丘尉明皇聞之召入供奉更今名復以道子為字由此名振天下大率師法張僧繇或者謂為後身焉至其變態縱橫與造物相上下則僧繇疑不能及也且畫有六法世稱顧愷之能備愷之畫鄰女以棘刺其心而使之呻吟道子畫驢於僧房一夕而聞有踏藉破迸之聲僧繇畫龍㸃睛則聞雷電破壁飛去道子畫龍則鱗甲飛動每天雨則煙霧生且顧冠於前張絶於後而道子乃兼有之則自視為如何也開元中將軍裴旻居母喪請道子畫鬼神於天宫寺資母冥福道子使旻屏去縗服用軍裝纒結馳馬舞劒激昻頓挫雄傑竒偉觀者數千百人無不駭栗而道子解衣䃲礴因用其氣以壯畫思落筆風生為天下壯觀故庖丁解牛輪扁斫輪皆以技進乎道而張顛觀公孫大娘舞劍器則草書入神道子之於畫亦若是而已況能屈驍將如此氣槩而豈常者哉然每一揮毫必須酣飲此與為文章何異正以氣為主耳至於畫圓光最在後轉臂運墨一筆而成觀者喧呼驚動坊邑此不幾於神耶且貴耳賤目者人之常情在當時猶取重若是況於傳逺乎議者謂有唐之盛文至於韓愈詩至於杜甫書至於顔真卿畫至於吳道𤣥天下之能事畢矣世所共傳而知者惟地獄變相觀其命意得隂隲陽授陽作隂報之理故畫或以金胄雜於桎梏固不可以體與迹論當以情考而理推也其它種種妙筆雜見於小說傳記此得以略姑紀其大槩勝絶者云道𤣥供奉時為內教博士非有詔不得畫官止寧王友今御府所藏九十有三天尊像一木紋天尊像一列聖朝元圖一佛㑹圖一熾盛光佛像一阿彌陀佛像一三方如來像一毗盧遮那佛像一維摩像二孔雀明王像四寶檀花菩薩像一觀音菩薩像二思維菩薩像一寶印菩薩像一慈氏菩薩像一大悲菩薩像三等覺菩薩像一如意菩薩像一二菩薩像一菩薩像一地藏像一帝釋像二太陽帝君像一辰星像一太白像一熒惑像一羅㬋像二計都像一五星像五五星圖一二十八宿像一托塔天王圖一護法天王像二行道天王像一雲蓋天王像一毗沙門天王像一請塔天王像一天王像五神王像二大護法神十四善神像九六甲神像一天龍神將像一摩那龍王像一和修吉龍王像一溫鉢羅龍王像一跋難陀龍王像一德義伽龍王像一檀相手印圖二雙林圖一南方寶生如來像一北方妙聲如來像一翟琰早師吳道𤣥每道𤣥畫落墨已即去多命琰布色蓋人物精神只在約略穠淡間而道𤣥輒許可故知琰自不凡琰布色落墨與道真贋故未易辨也今御府所藏四天尊聖像一太上像一孔雀明王像一天王圖一楊庭光與吳道𤣥同時善寫釋氏像與經變相㫄工雜畫山水等皆極其妙時謂頗有吳生體但行筆差細以此不同要之行筆細則所以劣於吳生也今御府所藏十有四藥師佛像一五祕密如來像一觀音像二如意輪菩薩像一思定菩薩像一思惟菩薩像一仁王菩薩像一長夀菩薩像一菩薩像一五星像一星官像一明星攜行圖一寫武后真一盧楞伽長安人學畫於吳道𤣥但才力有所未及尤喜作經變相入蜀名益著雖一時名流莫不斂衽乾元初嘗於大聖慈寺畫行道僧顔真卿為之題名時號二絶又嘗畫莊嚴寺三門竊自比道𤣥總持壁一日道𤣥忽見之驚嘆曰此子筆力常時不及我今乃相類是子也精爽盡於此矣居一月楞伽果卒楞伽所畫類皆佛像故知道𤣥之賞歎以為類已非虛得名也今御府所藏一百五十獻芝真人像一成道釋迦佛像一釋迦佛像四大悲菩薩像一觀音菩薩像一文殊菩薩像一普賢菩薩像一七俱胝菩薩像一羅漢像四十八十六尊者像十六羅漢像十六小十六羅漢像三智嵩笠渡僧像一渡水僧圖二髙僧像二髙僧圖二孔雀明王像一十六大阿羅漢像四十八趙德齊父溫以畫稱於世德齊遂能世其家竒蹤逸筆雅為時輩推許光化中詔許王建於成都置生祠命德齊畫西平王儀仗車輅旌旗森衛嚴整形容備盡及朝真殿上畫后妃嬪御皆極精妙昭宗喜之遷翰林待詔今御府所藏一過海天王像一范瓊不知何許人也寓居成都與陳皓彭堅同時俱以善畫人物道釋鬼神得名三人同手於諸寺圖畫佛像甚多咸通中於聖興寺大殿畫東北方天王并大悲像名動一時有烏瑟摩像設色未半而罷筆蹤超絶後之名手莫能補完是猶杜甫詩曰身輕一鳥過初傳之者偶闕一過字而當時詞人墨客補之終不能到故知筆端造化至超絶處則脫落筆墨畦徑矣今御府所藏九天地水三官像三南斗星君像一維摩像一文殊菩薩像一降塔天王像一寫飛亷神像一髙僧圖一常粲長安人咸通中路巗侍中牧蜀日粲入蜀雅為巖賔禮甚厚粲善畫道釋人物尤得時名喜為上古衣冠不墮近習衣冠益古則韻益勝此非畫工專形似之學者所能及也當時有伏犧畫卦神農播種陳元達鎖諫等圖皆傳世之妙也曲眉豐臉燕歌趙舞耳目所近玩者猶不見之而粲於筆下獨取播種鎖諌等事備之形容則亦詩人主文而譎諫之義也宜後世之有傳焉今御府所藏十有四伏羲畫卦像圖一神農播種像一佛因地圖一陳元達鎖諫圖一寫懿宗射兔圖一星官像一十才子圖二驗丹圖一故實人物圖五孫位㑹稽人也僖宗幸蜀位自京入蜀稱㑹稽山人舉止疏野襟韻曠達喜飲酒罕見其醉樂與幽人為物外交光啓中畫應天寺東壁位因潤州髙座寺張僧繇戰勝天王本筆之畫成矛㦸森嚴鼓吹戞擊若有聲在縹眇間至於鷹犬馳突雲龍出沒千狀萬態勢若飛動非筆精墨妙情髙格逸其能與於此耶其後改名遇卒不知所在今御府所藏二十有七說法太上像一天地水三官像三維摩圖一三教圖一星官圖一㑹仙圖一神仙故實圖四髙士圖一四皓奕碁圖一王波利圖一寫馬融像一寫畢卓圖一髙逸圖一取性圖二草堂圖三圍碁圖一掃象圖一番部博易圖一張南本不知何許人畫佛像鬼神甚工尤喜畫火火無常體世俗罕有能工之者獨南本得之嘗於成都金華寺大殿畫八明王時有一僧遊禮至寺整衣升殿壁間見所畫火勢焰逼人驚怛幾仆時孫位以畫水得名世之論畫水火之妙者獨推二子蓋水幾於道而火應於神非筆端深造理窟未易於形容也又嘗為寶歷寺圖佛事曲盡其妙後為人模寫竊換而去多散落荆湖間當時有勘書詩㑹髙麗王行香等圖盛傳於世今御府所藏三寫觀音圖一文殊部從圖一勘書圖一辛澄不知何許人多游蜀中見於益州名畫録工畫西方像不聞其他蓋專門之學也大抵釋氏貌像多作慈悲相趺坐即結跏埀臂則袒肉目不髙視首不軒舉淡然如枯木死灰便同設教故自為一家所以海州觀音泗州僧伽畫工之精者擅名一方以資衣食而不必兼善也澄嘗於蜀中大聖寺畫僧伽及諸變相士女傾城邑往觀焉後至者無地以容蜀人傳之為佳話且築室於道議者無不二三兹乃衆目所歸不待較而可得矣今御府所藏二十有五佛像一佛鋪圖一寶生佛像一甘露如來像一大悲菩薩像二觀音像二白衣觀音像一如意輪菩薩像一慈氏菩薩像一仁王菩薩像一寶印菩薩像二寶檀花菩薩像一文殊菩薩像一思維菩薩像一思念菩薩像一樂音菩薩像一不空釣菩薩像一侍香菩薩像一獻花菩薩像一蓮花菩薩像一香花菩薩像一張素卿簡州人也少孤貧作道士好畫道像僖宗時遣使封丈人山為希夷公素卿上表言丈人山在五嶽之上五嶽封王則此不當稱公詔可其請因賜紫其後作十二真君像各寫其賣卜貨丹書符導引之意人稱其妙安思謙因僞蜀主王氏誕辰獻之命翰林學士歐陽炯作讚黃居寶以八分書題之今御府所藏十有四天官像一三官像一九曜像一夀星像一容成真人像一董仲舒真人像一嚴君平真人像一李阿真人像一馬自然真人像一葛元真人像一長夀仙真人像一黃初平真人像一竇子明真人像一左慈真人像一道士陳若愚左蜀人師張素卿得丹青之妙於成都精思觀作青龍白虎朱雀𤣥武四君像聲譽益著畫東華帝君像尤工蓋東華帝君應位乎震自乾再索而得震震帝出以應物之地若愚非道家者流何以知此宜前此未有寫之者也今御府所藏一東華帝君像姚思元林泉人也畫道釋一時知名作紫微二十四化皆所以警悟世俗非止於逰戲丹青而自娛悅者也畫佛亦多取因地為之圖所傳於世者故自罕見之今御府所藏三佛㑹圖一孔雀佛鋪圖一紫微二十四化圖一宣和畫譜卷二
