body:
  text: 宣和畫譜卷十八花鳥四宋趙昌易元吉崔白崔慤艾宣丁貺葛守昌趙昌字昌之廣漢人善畫花果名重一時作折枝極有生意傅色尤造其妙兼工於草蟲然雖不及花果之為勝蓋晚年自喜其所得往往深藏而不市既流落則復自購以歸之故昌之畫世所難得且畫工特取其形耳若昌之作則不特取其形似直與花傳神者也又雜以文禽貓兔議者以謂非其所長然妙處正不在是觀者可以略也今御府所藏一百五十有四夾竹桃鴿圖一春花圖一桃竹雙鳩圖一桃竹鵓鴿圖一夾竹海棠圖一錦棠月季圖一海棠鳩子圖一青梅含桃圖一海棠鵓鴿圖一錦棠鳩禽圖一錦棠圖四杏花圖一牡丹圖六牡丹錦雞圖一牡丹鵓鴿圖二牡丹貓圖一牡丹戲貓圖一寫生牡丹圖一芍藥圖二海棠芍藥圖一萱草小貓圖一萱草圖一萱草榴花圖一萱草戲貓圖一石榴芍藥圖一石榴蒲萄圖一躑躅鷯子圖一李實枇杷圖一石榴梨圖一蒲萄枇杷圖二萱草蜀葵圖一李實緋杏圖一梅杏圖一寫生梨實圖一瓜桃圖一榴花戲貓圖二朱櫻碧李圖一躑躅戲貓圖二繡纓長春圖一黃葵鸂鶒圖二躑躅雀竹圖一拒霜鷺鷥圖二拒霜野雉圖一拒霜圖四拒霜錦雞圖三芙蓉野雞圖一寫生芙蓉圖一芙蓉竹雞圖一拒霜寒菊圖二芙蓉銅觜圖一葵花引禽圖一葵花戴勝圖一葵雉圖一蓼岸秋兔圖一牽牛繡纓圖一寫生花兔圖一荔子霜橘圖一寫生紅薇圖一蒲萄栗蓬圖一木瓜寒菊花圖一梅花雙鶉圖一梅花山茶圖一山茶繡纓圖一山茶花兔圖一栗蓬木瓜圖一山茶雙鶉圖一山茶圖一山茶小兔圖一山茶竹兔圖二早梅山茶圖一早梅錦雞圖一寫生折枝花圖六梅雀圖一梨柿圖一柿栗圖一果子圖一秋兔圖一寫生果實圖一二色山茶圖一太平花圖一月季花圖一萱葵圖二竹石戲貓圖一四季藂花圖四折枝花圖七寫生六花圖一雜果圖二羣花圖四雜花圖十四寫生花圖三海棠拒霜花圖一醉貓圖一寫生雜花圖一四季相屬圖一鸂鶒圖一乳貓圖一四季花引雛鷯兒圖一葵花引雛鷯子圖一易元吉字慶之長沙人天資穎異善畫得名于時初以工花鳥專門及見趙昌畫乃曰世未乏人要須擺脫舊習超軼古人之所未到則可以謂名家於是遂遊於荆湖間搜竒訪古名山大川每遇勝麗佳處輒留其意幾與猿狖鹿豕同遊故心傳目擊之妙一寫於毫端間則是世俗之所不得窺其藩也又嘗於長沙所居之舍後開圃鑿池間以亂石叢篁梅菊葭葦多馴飬水禽山獸以伺其動靜遊息之態以資於畫筆之思致故寫動植之狀無出其右者治平中景靈宫迎釐御扆詔元吉畫花石珍禽又於神遊殿作牙獐皆極臻其妙未幾復詔畫百猿圖而元吉遂得伸其所學今御府所藏二百四十有五牡丹鵓鴿圖一芍藥鵓鴿圖二梨花山鷓圖一寫生折枝花圖四夏景戲猿圖一夏景猿獐圖三夏景戲猴圖二太湖石孔雀圖二瓶花孔雀圖二盜果子母猿圖一秋景獐猿圖四秋景戲猿圖一秋景鷺鷥圖一湍流雙猿圖二娑羅花孔雀圖一蘆花羣猿圖一山茶馬鹿圖一山茶孔雀圖二山茶戲猿圖二衆禽噪虎圖二花枝翎毛圖一四獸羣居圖二三生羣戲圖二羣猿戲蜂圖二四生護雛圖四獾猿羣戲圖二獐猿羣戲圖一窠石獐猿圖二窠石猿圖二窠石雜猿圖二引雛戲獐猿圖二窠石山鷓圖二寫生蒲萄圖一寫生太平花圖一寫生石榴圖二寫瑞牡丹圖一寫生雜菜圖三寫生枇杷圖二寫生南果圖一寫生菜圖二寫生木瓜花圖一寫生芍藥圖一寫生藤墩貓圖一寫生月季圖一寫生雙鶉圖一寫生花圖一寫生鶴圖一寫生籠鵪圖一寫生獐圖一寫生戲貓圖三小景獐猿圖一寫生麋圖一小景獐鹿圖二小景戲猿圖四栗蓬猿圖一小景羣獐圖二猿猴驚顧圖二小景圖二子母戲貓圖一戲猿視猴圖二子母猴圖四子母戲猴圖二子母獐圖二子母戲猿圖二子母犬圖一枇杷戲猿圖二山林物性圖二引雛獐圖二竹石獐禽圖二栗枝山鷓圖一雞冠戲貓圖一竹石雙獐圖二青菜鼠狼圖一竹梢小禽圖一雙猿戲蜂圖二藤墩睡貓圖一四生圖二五瑞圖一百猿圖八百禽圖四羣獐圖八雙獐圖二四猿圖六雙猿圖二羣猿圖二戲猴圖二戲猿圖二十獐猿圖六狨猿圖二老猿圖一獐猴圖三獐石圖三戲貓圖一猿猴圖四戲獐圖三獾猿圖二槲獐圖一碎金圖四堆金圖一俊禽圖一雞鷹圖三折枝花圖一孔雀圖四金絲猿圖一雛鴨圖一猿圖二架鷂圖一睡貓圖一花雀圖一梅花圖一山槲雀鹿圖一竹石獐猿圖一寫生山茶圖一寫生紫丁香花圖一寫生紫竹戲猿圖一寫生玻璃盤時果圖一寫生木瓜山鷓圖一海棠花山茶戲獐圖二崔白字子西濠梁人善畫花竹羽毛芰荷鳬雁道釋鬼神山林飛走之類尤長於寫生極工於鵝所畫無不精絶落筆運思即成不假於繩尺曲直方圓皆中法度熙寧初被遇神考乃命白與艾宣丁貺葛守昌共畫垂拱御扆夾竹海棠鶴圖獨白為諸人之冠即補為圖畫院藝學白性疏逸力辭以去恩許非御前有旨毋與其事乃勉就焉蓋白恃才故不能無利鈍其妙處亦不減於古人嘗作謝安登東山子猷訪戴二圖為世所傳非其好古博雅而得古人之所以思致於筆端未必有也祖宗以來圖畫院之較藝者必以黃筌父子筆法為程式自白及吳元瑜出其格遂變今御府所藏二百四十有一春林山鷓圖一蟠桃山鷓圖一杏花鵝圖四杏竹家鵝圖二杏花雙鵝圖二杏竹黃鶯圖三杏花春禽圖一擁花鵝圖三杏花圖一牡丹戲貓圖二湖石風牡丹圖一落花雙鵝圖二飛鷹雙鵝圖二榮荷鷺鷥圖二落花流水圖四荷花家鵝圖一榮荷家鵝圖二秋塘雙鵝圖二江山風雨圖三白蓮雙鵝圖二秋陂鶻兔圖二秋峯野渡圖三秋塘羣鵝圖三秋塘雙鴨圖二秋荷羣鴨圖一秋荷雙鷺圖二秋荷野鴨圖四秋塘鴨鷺圖